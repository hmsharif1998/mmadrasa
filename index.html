        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

<!-- ========================================================== -->
<!-- লক স্ক্রিন ও পিন ভেরিফিকেশন কন্ট্রোলার -->
<!-- ========================================================== -->
<script>
(function() {
    window.enteredPin = "";

    // লোকাল ও ক্লাউড ডাটাবেজ থেকে ড্রপডাউন ইউজার লোড করা
    window.populateLockUserDropdown = async function() {
        const userSelect = document.getElementById('lock-user-select');
        if (!userSelect) return;

        userSelect.innerHTML = `<option value="">ইউজার নির্বাচন করুন</option>`;
        try {
            const localUsers = await db.users.toArray();
            const activeUsers = localUsers.filter(u => u.is_deleted !== 1);

            if (activeUsers.length === 0) {
                // ডিফল্ট fallback (যদি লোকাল কোনো ইউজার সিঙ্ক না হয়ে থাকে)
                userSelect.innerHTML += `<option value="admin">মুহতামিম (Default)</option>`;
            } else {
                activeUsers.forEach(u => {
                    let roleText = "মুহতামিম";
                    if (u.role === 'accountant') roleText = "হিসাবরক্ষক";
                    else if (u.role === 'teacher') roleText = "শিক্ষক";

                    userSelect.innerHTML += `<option value="${u.username}">${u.username} (${roleText})</option>`;
                });
            }
        } catch (err) {
            userSelect.innerHTML += `<option value="admin">মুহতামিম (Default)</option>`;
        }
    };

    window.pressPin = function(num) {
        if ((window.enteredPin || "").length < 4) {
            window.enteredPin = (window.enteredPin || "") + num;
            window.updatePinDots();
        }

        if ((window.enteredPin || "").length === 4) {
            setTimeout(window.checkPinSubmit, 200);
        }
    };

    window.updatePinDots = function() {
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach((dot, index) => {
            if (index < (window.enteredPin || "").length) {
                dot.className = "pin-dot w-4 h-4 rounded-full bg-yellow-300 border-2 border-yellow-300 scale-110 transition-all duration-150";
            } else {
                dot.className = "pin-dot w-4 h-4 rounded-full border-2 border-white/40 transition-all duration-150";
            }
        });
    };

    window.clearPinInput = function() {
        window.enteredPin = "";
        window.updatePinDots();
    };

    window.clearPin = function() {
        window.clearPinInput();
    };

    // ৩.১ পিন ভেরিফিকেশন ফ্লো (গুগল শিট অনলাইন এপিআই চেক)
    window.checkPinSubmit = async function() {
        const userSelect = document.getElementById('lock-user-select');
        const username = userSelect ? userSelect.value : '';
        const pin = window.convertToEnglishDigits(window.enteredPin);

        if (!username) {
            showToast("দয়া করে ইউজার নির্বাচন করুন!", "error");
            window.clearPinInput();
            return;
        }

        // এনিমেশন শুরু: ইনপুট হাইড ও লোডার প্রদর্শন
        const lockInputGroup = document.getElementById('lock-input-group');
        const lockKeypadArea = document.getElementById('lock-keypad-area');
        const lockStatusArea = document.getElementById('lock-status-area');
        const lockHeaderIcon = document.getElementById('lock-header-icon');

        const statusIconBox = document.getElementById('status-icon-box');
        const statusMessage = document.getElementById('status-message');
        const statusSubMessage = document.getElementById('status-sub-message');

        if (lockInputGroup) lockInputGroup.classList.add('hidden');
        if (lockKeypadArea) lockKeypadArea.classList.add('hidden');
        if (lockHeaderIcon) lockHeaderIcon.classList.add('hidden');
        
        if (lockStatusArea) {
            lockStatusArea.classList.remove('hidden');
            statusIconBox.className = "mx-auto w-16 h-16 rounded-full flex items-center justify-center text-3xl bg-white/10 text-yellow-300 animate-spin";
            statusIconBox.innerHTML = `<i class="fa-solid fa-spinner"></i>`;
            statusMessage.textContent = "পিন যাচাই করা হচ্ছে...";
            statusSubMessage.textContent = "সার্ভারের সাথে সংযোগ স্থাপন করা হচ্ছে";
        }

        // ৩.২ অনলাইন চেক (Online API Authentication)
        if (navigator.onLine && SCRIPT_URL) {
            try {
                const payload = new URLSearchParams({
                    action: 'verify_user',
                    username: username,
                    pin: pin
                }).toString();

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: payload
                });

                if (!response.ok) throw new Error("নেটওয়ার্ক সমস্যা");

                const result = await response.json();

                if (result.status === 'success') {
                    // সফল লগইন স্টেট
                    await handleSuccessfulLogin(username, result.role, result.fullname || username, pin);
                    return;
                } else {
                    // ভুল পিন স্টেট
                    handleFailedLogin(result.message || "ভুল পিন নাম্বার!");
                    return;
                }
            } catch (err) {
                console.warn("অনলাইন লগইন ফেইলড, অফলাইন ডেটা চেক করা হচ্ছে...");
            }
        }

        // ৩.৩ অফলাইন ব্যাকআপ চেক (Offline Dexie Fallback Check)
        try {
            // যদি অফলাইন থাকে এবং ডেটাবেজে কোনো ইউজার না থাকে তবে ডিফল্ট অ্যাডমিন বাইপাস
            const totalUsers = await db.users.count();
            if (totalUsers === 0 && username === 'admin' && pin === '1234') {
                await handleSuccessfulLogin('admin', 'muhtamim', 'মুহতামিম', '1234');
                return;
            }

            const localUser = await db.users.get(username);
            if (localUser && localUser.is_deleted !== 1 && localUser.pin === pin) {
                await handleSuccessfulLogin(username, localUser.role, username, pin);
            } else {
                handleFailedLogin("ভুল পিন কোড! পুনরায় চেষ্টা করুন।");
            }
        } catch (err) {
            handleFailedLogin("অফলাইন যাচাইকরণে ত্রুটি হয়েছে!");
        }
    };

    // ৪. সফল লগইন রেন্ডারিং (আলহামদু লিল্লাহ!)
    async function handleSuccessfulLogin(username, role, fullname, pin) {
        const statusIconBox = document.getElementById('status-icon-box');
        const statusMessage = document.getElementById('status-message');
        const statusSubMessage = document.getElementById('status-sub-message');

        // সাকসেস স্টেট রেন্ডার
        if (statusIconBox) {
            statusIconBox.className = "mx-auto w-16 h-16 rounded-full flex items-center justify-center text-4xl bg-emerald-500/20 text-emerald-400 border border-emerald-500 animate-bounce";
            statusIconBox.innerHTML = `<i class="fa-solid fa-circle-check"></i>`;
        }
        if (statusMessage) statusMessage.textContent = "আলহামদু লিল্লাহ";
        if (statusSubMessage) statusSubMessage.textContent = `${fullname} হিসেবে সফলভাবে প্রবেশ করেছেন`;

        // সেশন স্টোরেজে সংরক্ষণ
        const userObj = { username, role, fullname };
        sessionStorage.setItem('currentUser', JSON.stringify(userObj));
        window.currentUser = userObj;

        // লোকাল ডেটাবেজে সিঙ্কড কপি আপডেট করা
        try {
            await db.users.put({
                username: username,
                pin: pin,
                role: role,
                is_synced: 1,
                is_deleted: 0
            });
        } catch(e) {}

        // উইন্ডো হেডার ও সাইডবার ফিল্টার আপডেট করা
        const userBadge = document.getElementById('user-display-badge');
        if (userBadge) {
            let roleTitle = "মুহতামিম";
            if (role === 'accountant') roleTitle = "হিসাবরক্ষক";
            else if (role === 'teacher') roleTitle = "শিক্ষক";

            userBadge.innerHTML = `<i class="fa-solid fa-user-circle"></i> ${fullname} (${roleTitle})`;
            userBadge.classList.remove('hidden');
        }

        setTimeout(() => {
            const overlay = document.getElementById('pin-lock-overlay');
            if (overlay) overlay.style.display = 'none';

            // ইনপুট ফর্ম রিসেট
            resetLockOverlayState();

            // রোল অনুযায়ী সাইডবার কনফিগার করা
            window.updateSidebarNavigation();
            
            // ড্যাশবোর্ড মডিউল লোড করা
            loadModule('dashboard');
        }, 1500);
    }

    // ৫. ব্যর্থ লগইন রেন্ডারিং (ইন্না লিল্লাহ!)
    function handleFailedLogin(errorText) {
        const statusIconBox = document.getElementById('status-icon-box');
        const statusMessage = document.getElementById('status-message');
        const statusSubMessage = document.getElementById('status-sub-message');
        const overlayCard = document.querySelector('#pin-lock-overlay > div');

        if (statusIconBox) {
            statusIconBox.className = "mx-auto w-16 h-16 rounded-full flex items-center justify-center text-4xl bg-red-500/20 text-red-400 border border-red-500";
            statusIconBox.innerHTML = `<i class="fa-solid fa-circle-xmark"></i>`;
        }
        if (statusMessage) statusMessage.textContent = "ইন্না লিল্লাহ";
        if (statusSubMessage) statusSubMessage.textContent = errorText;

        if (overlayCard) {
            overlayCard.classList.add('animate-shake');
            setTimeout(() => overlayCard.classList.remove('animate-shake'), 400);
        }

        setTimeout(() => {
            resetLockOverlayState();
        }, 1800);
    }

    function resetLockOverlayState() {
        const lockInputGroup = document.getElementById('lock-input-group');
        const lockKeypadArea = document.getElementById('lock-keypad-area');
        const lockStatusArea = document.getElementById('lock-status-area');
        const lockHeaderIcon = document.getElementById('lock-header-icon');

        if (lockInputGroup) lockInputGroup.classList.remove('hidden');
        if (lockKeypadArea) lockKeypadArea.classList.remove('hidden');
        if (lockHeaderIcon) lockHeaderIcon.classList.remove('hidden');
        if (lockStatusArea) lockStatusArea.classList.add('hidden');

        window.clearPinInput();
    }

    // কিবোর্ড ইভেন্ট লিসেনার
    document.addEventListener('keydown', (e) => {
        const overlay = document.getElementById('pin-lock-overlay');
        if (overlay && overlay.style.display !== 'none' && !document.getElementById('lock-status-area').classList.contains('hidden') === false) {
            if (e.key >= '0' && e.key <= '9') {
                window.pressPin(e.key);
            } else if (e.key === 'Backspace') {
                window.clearPin();
            } else if (e.key === 'Enter') {
                window.checkPinSubmit();
            }
        }
    });

    window.toggleSidebar = function() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        if (!sidebar || !backdrop) return;
        
        if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.add('hidden');
        }
    };

    // ডাইনামিক মাদরাসা নাম ও লোগো রেন্ডারিং
    window.applyGlobalSettings = function() {
        const name = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';
        const logoUrl = localStorage.getItem('madrasah_logo') || '';

        const lockTitle = document.getElementById('lock-madrasah-name');
        if (lockTitle) lockTitle.textContent = name;

        const sidebarTitle = document.getElementById('sidebar-madrasah-name');
        if (sidebarTitle) {
            sidebarTitle.innerHTML = `
                <div class="flex items-center gap-2.5">
                    ${logoUrl ? `<img class="w-8 h-8 rounded-full object-cover border border-emerald-800/50 shadow-inner" src="${logoUrl}">` : '<i class="fa-solid fa-mosque text-emerald-300"></i>'}
                    <span class="truncate text-base font-bold">${name}</span>
                </div>`;
        }
    };

    document.addEventListener('DOMContentLoaded', async () => {
        window.applyGlobalSettings();
        await window.populateLockUserDropdown();
    });
})();
</script>
</body>
