<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাদরাসা ম্যানেজমেন্ট সিস্টেম</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js CDN (ভিজ্যুয়াল গ্রাফ ও চার্ট রেন্ডারার) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FontAwesome CDN (আইকন কালেকশন) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* Hind Siliguri এবং Inter ফন্টের মসৃণ সমন্বয় */
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Hind Siliguri', 'Inter', sans-serif;
        }
        .font-en {
            font-family: 'Inter', sans-serif;
        }

        /* লক স্ক্রিনের ভুল পিনের জন্য কম্পন (Shake) অ্যানিমেশন */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        /* পিন স্ক্রিন ব্যাকগ্রাউন্ড (Sleek Dark Green Glassmorphism) */
        #pin-lock-overlay {
            display: flex;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #022c22 0%, #064e3b 50%, #022c22 100%);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        #pin-lock-overlay.hidden {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden select-none">

<!-- টোস্ট নোটিফিকেশন কন্টেইনার -->
<div id="toast-container" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

<!-- পিন লক ওভারলে স্ক্রিন -->
<div id="pin-lock-overlay">
    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-3xl border border-white/20 shadow-2xl max-w-sm w-full mx-4 text-center transform transition-all duration-300">
        <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/20">
            <i class="fa-solid fa-lock text-3xl text-yellow-300 animate-pulse"></i>
        </div>
        
        <!-- ডাইনামিক মাদরাসার নাম -->
        <h2 id="lock-madrasah-name" class="text-2xl font-extrabold mb-2 text-white">মাদরাসাতুল মদিনা</h2>
        <p class="text-emerald-200 text-sm mb-6 font-semibold">অ্যাপে প্রবেশ করতে নিরাপত্তা পিন কোড দিন</p>

        <!-- পিন ডট ইন্ডিকেটর সমূহ -->
        <div class="flex justify-center gap-4 mb-8">
            <span class="pin-dot w-4 h-4 rounded-full border-2 border-white/40 transition-all duration-150"></span>
            <span class="pin-dot w-4 h-4 rounded-full border-2 border-white/40 transition-all duration-150"></span>
            <span class="pin-dot w-4 h-4 rounded-full border-2 border-white/40 transition-all duration-150"></span>
            <span class="pin-dot w-4 h-4 rounded-full border-2 border-white/40 transition-all duration-150"></span>
        </div>

        <!-- সংখ্যা টাইপ করার কিপ্যাড (উইন্ডো মেথড বাইন্ডিং সহ) -->
        <div class="grid grid-cols-3 gap-4 max-w-[240px] mx-auto">
            <button onclick="window.pressPin('1')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">1</button>
            <button onclick="window.pressPin('2')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">2</button>
            <button onclick="window.pressPin('3')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">3</button>
            <button onclick="window.pressPin('4')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">4</button>
            <button onclick="window.pressPin('5')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">5</button>
            <button onclick="window.pressPin('6')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">6</button>
            <button onclick="window.pressPin('7')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">7</button>
            <button onclick="window.pressPin('8')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">8</button>
            <button onclick="window.pressPin('9')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">9</button>
            <button onclick="window.clearPin()" class="w-14 h-14 rounded-full flex items-center justify-center text-red-300 font-bold text-xs hover:text-red-200 active:scale-95 transition-all">মুছুন</button>
            <button onclick="window.pressPin('0')" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 flex items-center justify-center font-extrabold text-xl text-white transition-all shadow-sm">0</button>
            <button onclick="window.checkPinSubmit()" class="w-14 h-14 rounded-full flex items-center justify-center text-emerald-300 font-extrabold text-xl hover:text-emerald-200 active:scale-95 transition-all">✓</button>
        </div>
    </div>
</div>

<div class="flex h-screen overflow-hidden">

    <!-- মোবাইল সাইডবার ব্যাকড্রপ ব্লার ওভারলে -->
    <div id="sidebar-backdrop" onclick="window.toggleSidebar()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 hidden md:hidden transition-all duration-300"></div>

    <!-- সাইডবার প্যানেল -->
    <div id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 bg-gradient-to-b from-emerald-950 to-emerald-900 text-white flex flex-col justify-between transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out z-40 shadow-2xl md:shadow-none border-r border-emerald-800/30">
        <div class="p-5">
            <!-- লোগো ও মাদরাসার ডাইনামিক নাম -->
            <h1 id="sidebar-madrasah-name" class="text-lg font-bold tracking-wider mb-8 border-b border-emerald-800/40 pb-4">
                <i class="fa-solid fa-mosque text-emerald-300"></i> মাদরাসাতুল মদিনা
            </h1>

            <!-- ন্যাভিগেশন লিংক সমূহ -->
            <nav class="space-y-1">
                <button onclick="loadModule('dashboard')" id="nav-dashboard" class="w-full text-left py-2.5 px-4 rounded-xl transition duration-200 hover:bg-emerald-800/40 flex items-center gap-3 font-semibold text-xs md:text-sm">
                    <i class="fa-solid fa-chart-line w-5 text-emerald-300"></i> ড্যাশবোর্ড
                </button>
                <button onclick="loadModule('admission')" id="nav-admission" class="w-full text-left py-2.5 px-4 rounded-xl transition duration-200 hover:bg-emerald-800/40 flex items-center gap-3 font-semibold text-xs md:text-sm">
                    <i class="fa-solid fa-user-plus w-5 text-emerald-300"></i> ছাত্র ভর্তি
                </button>
                <button onclick="loadModule('fees')" id="nav-fees" class="w-full text-left py-2.5 px-4 rounded-xl transition duration-200 hover:bg-emerald-800/40 flex items-center gap-3 font-semibold text-xs md:text-sm">
                    <i class="fa-solid fa-money-bill-wave w-5 text-emerald-300"></i> বেতন কালেকশন
                </button>
                <button onclick="loadModule('student_list')" id="nav-student_list" class="w-full text-left py-2.5 px-4 rounded-xl transition duration-200 hover:bg-emerald-800/40 flex items-center gap-3 font-semibold text-xs md:text-sm">
                    <i class="fa-solid fa-users w-5 text-emerald-300"></i> ছাত্রদের তালিকা
                </button>
                <button onclick="loadModule('expense')" id="nav-expense" class="w-full text-left py-2.5 px-4 rounded-xl transition duration-200 hover:bg-emerald-800/40 flex items-center gap-3 font-semibold text-xs md:text-sm">
                    <i class="fa-solid fa-file-invoice-dollar w-5 text-emerald-300"></i> খরচের খাতা
                </button>
                <button onclick="loadModule('attendance')" id="nav-attendance" class="w-full text-left py-2.5 px-4 rounded-xl transition duration-200 hover:bg-emerald-800/40 flex items-center gap-3 font-semibold text-xs md:text-sm">
                    <i class="fa-solid fa-calendar-check w-5 text-emerald-300"></i> দৈনিক হাজিরা
                </button>
                <button onclick="loadModule('settings')" id="nav-settings" class="w-full text-left py-2.5 px-4 rounded-xl transition duration-200 hover:bg-emerald-800/40 flex items-center gap-3 font-semibold text-xs md:text-sm">
                    <i class="fa-solid fa-gear w-5 text-emerald-300"></i> সেটিংস
                </button>
            </nav>
        </div>

        <!-- সংযোগের তথ্য ও সিঙ্ক ইন্ডিকেটর প্যানেল -->
        <div class="p-5 border-t border-emerald-800/40 text-[11px] space-y-2.5 bg-emerald-950/50">
            <div class="flex items-center justify-between">
                <span class="text-emerald-300 font-bold">সার্ভার সংযোগ:</span>
                <span id="connection-status" class="px-2 py-0.5 rounded-full bg-red-500 text-white font-extrabold flex items-center gap-1">
                    <i class="fa-solid fa-plane-slash"></i> অফলাইন
                </span>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-emerald-300 font-bold">সিঙ্ক পেন্ডিং:</span>
                <span id="pending-sync-count" class="font-extrabold text-yellow-300 font-en text-xs">0</span>
            </div>
            <button onclick="triggerManualSync()" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 py-2 rounded-xl flex items-center justify-center gap-1.5 font-bold transition duration-150 shadow-md shadow-emerald-950/20 text-xs">
                <i class="fa-solid fa-rotate" id="sync-icon"></i> সিঙ্ক করুন
            </button>
        </div>
    </div>

    <!-- মূল কন্টেন্ট এরিয়া -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- টপ হেডার বার -->
        <header class="bg-white shadow-sm border-b px-6 py-4 flex items-center justify-between z-10 no-print">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-emerald-800 text-xl focus:outline-none w-10 h-10 rounded-xl hover:bg-gray-100 flex items-center justify-center transition border" onclick="window.toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 id="page-title" class="text-xl font-bold text-gray-800">ড্যাশবোর্ড</h2>
            </div>

            <!-- রিয়্যাল-টাইম সিঙ্ক ইন্ডিকেটর -->
            <div class="flex items-center gap-3 text-sm text-gray-600">
                <span id="sync-loader" class="hidden text-emerald-600 font-bold flex items-center gap-1.5 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200 shadow-sm animate-pulse text-xs">
                    <i class="fa-solid fa-spinner animate-spin"></i> ক্লাউডে সিঙ্ক হচ্ছে...
                </span>
                <span class="font-bold bg-gray-100 px-3 py-1.5 rounded-xl border text-xs">এডমিন প্যানেল</span>
            </div>
        </header>

        <!-- মডিউল লোড হওয়ার মূল উইন্ডো -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 bg-gray-50">
            <div id="main-content" class="transition-all duration-300">
                <div class="flex items-center justify-center h-64 text-gray-400">
                    <div class="text-center">
                        <i class="fa-solid fa-lock text-5xl text-emerald-600 mb-4 animate-bounce"></i>
                        <p class="text-lg font-bold">অ্যাপ্লিকেশন লক করা আছে...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Dexie.js Database Wrapper -->
<script src="dexie.js"></script>

<!-- App Core Script -->
<script src="app.js"></script>

<!-- পিন লক স্ক্রিন জাভাস্ক্রিপ্ট কন্ট্রোলার (উইন্ডো মেথড বাইন্ডিং সহ) -->
<script>
(function() {
    window.enteredPin = "";
    
    window.pressPin = function(num) {
        if ((window.enteredPin || "").length < 4) {
            window.enteredPin = (window.enteredPin || "") + num;
            window.updatePinDots();
        }

        if ((window.enteredPin || "").length === 4) {
            setTimeout(window.checkPinSubmit, 200);
        }
    };

    window.updatePinDots = function() {
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach((dot, index) => {
            if (index < (window.enteredPin || "").length) {
                dot.className = "pin-dot w-4 h-4 rounded-full bg-yellow-300 border-2 border-yellow-300 scale-110 transition-all duration-150";
            } else {
                dot.className = "pin-dot w-4 h-4 rounded-full border-2 border-white/40 transition-all duration-150";
            }
        });
    };

    window.clearPin = function() {
        window.enteredPin = "";
        window.updatePinDots();
    };

    window.checkPinSubmit = function() {
        const CORRECT_PIN = localStorage.getItem('madrasah_pin') || "1234";
        if (window.enteredPin === CORRECT_PIN) {
            showToast("স্বাগতম! লক সফলভাবে খোলা হয়েছে।", "success");
            window.unlockApp();
        } else {
            showToast("ভুল পিন কোড! পুনরায় চেষ্টা করুন।", "error");

            const card = document.querySelector('#pin-lock-overlay > div');
            if (card) {
                card.classList.add('animate-shake');
                setTimeout(() => card.classList.remove('animate-shake'), 300);
            }

            window.enteredPin = "";
            window.updatePinDots();
        }
    };

    window.unlockApp = function() {
        const overlay = document.getElementById('pin-lock-overlay');
        if (overlay) {
            overlay.style.display = 'none';
            if (typeof loadModule === 'function') {
                loadModule('dashboard');
            }
        }
    };

    window.lockApp = function() {
        const overlay = document.getElementById('pin-lock-overlay');
        if (overlay) {
            overlay.style.display = 'flex';
            window.enteredPin = "";
            window.updatePinDots();
        }
    };

    // কিবোর্ড ইভেন্ট লিসেনার
    document.addEventListener('keydown', (e) => {
        const overlay = document.getElementById('pin-lock-overlay');
        if (overlay && overlay.style.display !== 'none') {
            if (e.key >= '0' && e.key <= '9') {
                window.pressPin(e.key);
            } else if (e.key === 'Backspace') {
                window.clearPin();
            } else if (e.key === 'Enter') {
                window.checkPinSubmit();
            }
        }
    });

    window.toggleSidebar = function() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        if (!sidebar || !backdrop) return;
        
        if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.add('hidden');
        }
    };

    // ডাইনামিক মাদরাসা নাম ও লোগো রেন্ডারিং
    window.applyGlobalSettings = function() {
        const name = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';
        const logoUrl = localStorage.getItem('madrasah_logo') || '';

        const lockTitle = document.getElementById('lock-madrasah-name');
        if (lockTitle) lockTitle.textContent = name;

        const sidebarTitle = document.getElementById('sidebar-madrasah-name');
        if (sidebarTitle) {
            sidebarTitle.innerHTML = `
                <div class="flex items-center gap-2.5">
                    ${logoUrl ? `<img class="w-8 h-8 rounded-full object-cover border border-emerald-800/50 shadow-inner" src="${logoUrl}">` : '<i class="fa-solid fa-mosque text-emerald-300"></i>'}
                    <span class="truncate text-base font-bold">${name}</span>
                </div>`;
        }
    };

    document.addEventListener('DOMContentLoaded', function() {
        const overlay = document.getElementById('pin-lock-overlay');
        if (overlay) {
            overlay.style.display = 'flex';
        }
        window.applyGlobalSettings();
    });
})();
</script>
</body>
</html>
