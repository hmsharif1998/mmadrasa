<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- ছাত্র ভর্তি ফরম (১ ভাগ জায়গা নেবে) -->
    <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
        <h3 id="form-title" class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-user-plus text-emerald-600"></i> নতুন ছাত্র ভর্তি ফরম
        </h3>

        <form id="admission-form" class="space-y-4">
            <!-- এডিট ট্র্যাকিংয়ের জন্য হিডেন আইডি ফিল্ড -->
            <input type="hidden" id="editing-student-id" value="">

            <!-- আইডি ও সিরিয়াল নম্বর (পাশাপাশি) -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">আইডি নম্বর *</label>
                    <input type="text" id="student-id" required placeholder="S-10001"
                           class="w-full px-3 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-semibold bg-gray-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">সিরিয়াল নম্বর *</label>
                    <input type="number" id="student-serial" required placeholder="যেমন: ১"
                           class="w-full px-3 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-semibold">
                </div>
            </div>

            <!-- নাম ও পিতার নাম -->
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ছাত্রের নাম *</label>
                    <input type="text" id="student-name" required placeholder="যেমন: আবদুর রহমান"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">পিতার নাম *</label>
                    <input type="text" id="student-father-name" required placeholder="যেমন: মো: আবুল কাশেম"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                </div>
            </div>

            <!-- শ্রেণী নির্বাচন (আধুনিক রেডিও বাটন গ্রিড) -->
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2">শ্রেণী নির্বাচন করুন *</label>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    <!-- হিফজ -->
                    <label class="cursor-pointer">
                        <input type="radio" name="student-class" value="হিফজ" required class="sr-only peer">
                        <div class="text-center p-2 rounded-xl border border-gray-200 bg-white hover:bg-emerald-50/40 peer-checked:border-emerald-600 peer-checked:bg-emerald-50 transition duration-150">
                            <span class="text-xs font-bold text-gray-700 peer-checked:text-emerald-950">হিফজ</span>
                        </div>
                    </label>
                    <!-- নাজেরা -->
                    <label class="cursor-pointer">
                        <input type="radio" name="student-class" value="নাজেরা" required class="sr-only peer">
                        <div class="text-center p-2 rounded-xl border border-gray-200 bg-white hover:bg-emerald-50/40 peer-checked:border-emerald-600 peer-checked:bg-emerald-50 transition duration-150">
                            <span class="text-xs font-bold text-gray-700 peer-checked:text-emerald-950">নাজেরা</span>
                        </div>
                    </label>
                    <!-- নূরানী -->
                    <label class="cursor-pointer">
                        <input type="radio" name="student-class" value="নূরানী" required class="sr-only peer">
                        <div class="text-center p-2 rounded-xl border border-gray-200 bg-white hover:bg-emerald-50/40 peer-checked:border-emerald-600 peer-checked:bg-emerald-50 transition duration-150">
                            <span class="text-xs font-bold text-gray-700 peer-checked:text-emerald-950">নূরানী</span>
                        </div>
                    </label>
                    <!-- প্রথম শ্রেণী -->
                    <label class="cursor-pointer">
                        <input type="radio" name="student-class" value="প্রথম শ্রেণী" required class="sr-only peer">
                        <div class="text-center p-2 rounded-xl border border-gray-200 bg-white hover:bg-emerald-50/40 peer-checked:border-emerald-600 peer-checked:bg-emerald-50 transition duration-150">
                            <span class="text-xs font-bold text-gray-700 peer-checked:text-emerald-950">১ম শ্রেণী</span>
                        </div>
                    </label>
                    <!-- দ্বিতীয় শ্রেণী -->
                    <label class="cursor-pointer">
                        <input type="radio" name="student-class" value="দ্বিতীয় শ্রেণী" required class="sr-only peer">
                        <div class="text-center p-2 rounded-xl border border-gray-200 bg-white hover:bg-emerald-50/40 peer-checked:border-emerald-600 peer-checked:bg-emerald-50 transition duration-150">
                            <span class="text-xs font-bold text-gray-700 peer-checked:text-emerald-950">২য় শ্রেণী</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- রোল নম্বর -->
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">রোল নম্বর *</label>
                <input type="number" id="student-roll" required placeholder="যেমন: ১০"
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-semibold">
            </div>

            <!-- মোবাইল ও হোয়াটসঅ্যাপ নম্বর -->
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">অভিভাবকের মোবাইল নম্বর *</label>
                    <input type="tel" id="student-phone" required placeholder="যেমন: 017XXXXXXXX" pattern="[0-9]{11}" oninput="syncWhatsapp()"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-gray-500">হোয়াটসঅ্যাপ নম্বর</label>
                        <label class="inline-flex items-center gap-1.5 cursor-pointer text-xs text-emerald-700 font-semibold">
                            <input type="checkbox" id="same-as-mobile" class="rounded text-emerald-600 focus:ring-emerald-500" onchange="toggleWhatsappSync()">
                            <span>মোবাইলের মতই</span>
                        </label>
                    </div>
                    <input type="tel" id="student-whatsapp" placeholder="যেমন: 017XXXXXXXX" pattern="[0-9]{11}"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                </div>
            </div>

            <!-- ঠিকানা -->
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">বর্তমান ঠিকানা *</label>
                <textarea id="student-address" required placeholder="গ্রাম, ডাকঘর, থানা ও জেলা লিখুন..." rows="2"
                          class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm resize-none"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2">
                <i class="fa-solid fa-circle-check"></i> ভর্তি নিশ্চিত করুন
            </button>

            <!-- সংশোধন বাতিল করার বাটন (শুধুমাত্র এডিটের সময় দেখাবে) -->
            <button type="button" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl transition duration-200 mt-2">
                সংশোধন বাতিল করুন
            </button>
        </form>
    </div>

    <!-- ভর্তি হওয়া ছাত্রদের তালিকা (২ ভাগ জায়গা নেবে) -->
    <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-list-ul text-emerald-600"></i> ভর্তি হওয়া ছাত্রদের তালিকা
        </h3>

        <!-- সার্চ ও ফিল্টারিং প্যানেল -->
        <div class="mb-5 flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="text" id="search-student" oninput="filterStudents()" placeholder="নাম, আইডি বা মোবাইল নম্বর দিয়ে খুঁজুন..."
                       class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>
            <div class="w-full sm:w-48">
                <select id="filter-class" onchange="filterStudents()"
                        class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm bg-white font-semibold text-gray-700">
                    <option value="">সকল শ্রেণী</option>
                    <option value="হিফজ">হিফজ</option>
                    <option value="নাজেরা">নাজেরা</option>
                    <option value="নূরানী">নূরানী</option>
                    <option value="প্রথম শ্রেণী">প্রথম শ্রেণী</option>
                    <option value="দ্বিতীয় শ্রেণী">দ্বিতীয় শ্রেণী</option>
                </select>
            </div>
        </div>

        <!-- রেসপনসিভ টেবিল কন্টেইনার -->
        <div class="overflow-x-auto flex-1 max-h-[550px] overflow-y-auto">
            <table class="min-w-full divide-y divide-gray-100">
                <thead class="bg-gray-50 sticky top-0 z-10">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">সিরিয়াল</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">রোল</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">আইডি ও নাম</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">পিতার নাম</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">শ্রেণী</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">যোগাযোগ</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">স্ট্যাটাস</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">অ্যাকশন</th>
                </tr>
                </thead>
                <tbody id="students-table-body" class="bg-white divide-y divide-gray-100">
                <!-- ডাইনামিক ডাটা এখানে লোড হবে -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- এই মডিউলের জন্য ডেডিকেটেড জাভাস্ক্রিপ্ট কোড -->
<script>
    // ভর্তি মডিউল লোড হওয়ার সময় স্বয়ংক্রিয়ভাবে রান হবে
    async function initAdmission() {
        document.getElementById('editing-student-id').value = "";
        document.getElementById('student-id').readOnly = false;

        // আইডি ও সিরিয়াল অটো-জেনারেট করা
        await generateIdAndSerial();
        await renderStudentsList();

        const form = document.getElementById('admission-form');
        if (form) {
            form.onsubmit = async (e) => {
                e.preventDefault();

                const id = document.getElementById('student-id').value.trim();
                const serialNo = parseInt(document.getElementById('student-serial').value);
                const name = document.getElementById('student-name').value.trim();
                const fatherName = document.getElementById('student-father-name').value.trim();
                const roll = parseInt(document.getElementById('student-roll').value);
                const phone = document.getElementById('student-phone').value.trim();
                const whatsapp = document.getElementById('student-whatsapp').value.trim();
                const address = document.getElementById('student-address').value.trim();
                const editId = document.getElementById('editing-student-id').value;

                // রেডিও বাটন থেকে নির্বাচিত শ্রেণী বের করা
                const selectedClassRadio = document.querySelector('input[name="student-class"]:checked');
                const className = selectedClassRadio ? selectedClassRadio.value : '';

                if (!id || !serialNo || !name || !fatherName || !className || !roll || !phone || !address) {
                    showToast("সব লাল চিহ্নিত (*) ঘরগুলো পূরণ করুন!", "error");
                    return;
                }

                try {
                    // একই শ্রেণীতে একই রোল নম্বর আছে কিনা তা চেক করা (ডুপ্লিকেট চেক)
                    const duplicate = await db.students
                        .where({ class: className, roll: roll })
                        .first();

                    if (duplicate && duplicate.id !== editId && duplicate.is_deleted !== 1) {
                        showToast(`দুঃখিত! ${className} শ্রেণীতে রোল নম্বর ${roll} ইতিমধ্যে একজন শিক্ষার্থীর জন্য সংরক্ষিত আছে।`, "error");
                        return;
                    }

                    if (editId) {
                        // ডাটা এডিট/আপডেট করা
                        await db.students.update(editId, {
                            serial_no: serialNo,
                            name: name,
                            father_name: fatherName,
                            class: className,
                            roll: roll,
                            parent_phone: phone,
                            whatsapp_no: whatsapp,
                            address: address,
                            is_synced: 0
                        });
                        showToast("শিক্ষার্থীর তথ্য সফলভাবে সংশোধন করা হয়েছে।", "success");
                        cancelEdit();
                    } else {
                        // নতুন শিক্ষার্থী যুক্ত করা
                        const admissionDate = new Date().toISOString().split('T')[0];

                        await db.students.add({
                            id: id,
                            serial_no: serialNo,
                            name: name,
                            father_name: fatherName,
                            class: className,
                            roll: roll,
                            parent_phone: phone,
                            whatsapp_no: whatsapp,
                            address: address,
                            admission_date: admissionDate,
                            is_synced: 0,
                            is_deleted: 0
                        });
                        showToast("নতুন ছাত্র সফলভাবে ভর্তি করা হয়েছে।", "success");
                        form.reset();
                    }

                    await generateIdAndSerial();
                    await renderStudentsList();

                    if (typeof updatePendingCount === 'function') {
                        await updatePendingCount();
                    }

                    if (navigator.onLine && typeof triggerAutoSync === 'function') {
                        triggerAutoSync();
                    }

                } catch (err) {
                    console.error("ভর্তি/আপডেট প্রক্রিয়ায় সমস্যা:", err);
                    showToast("দুঃখিত, তথ্য সংরক্ষণ করা সম্ভব হয়নি। আবার চেষ্টা করুন।", "error");
                }
            };
        }
    }

    // ইউনিক আইডি এবং পরবর্তী সিরিয়াল নম্বর অটো-জেনারেট করার লজিক
    async function generateIdAndSerial() {
        try {
            const students = await db.students.toArray();
            const activeStudents = students.filter(s => s.is_deleted !== 1);

            // সিরিয়াল নম্বর নির্ধারণ (মোট শিক্ষার্থীর সংখ্যা + ১)
            const nextSerial = activeStudents.length + 1;
            document.getElementById('student-serial').value = nextSerial;

            // আইডি নম্বর নির্ধারণ (S- এরপর ১০ হাজার + পরবর্তী সিরিয়াল)
            const generatedId = "S-" + (10000 + nextSerial);
            document.getElementById('student-id').value = generatedId;
            document.getElementById('student-id').readOnly = false;
        } catch (err) {
            console.error("আইডি ও সিরিয়াল নম্বর জেনারেট করতে ব্যর্থ:", err);
        }
    }

    // মোবাইল নম্বরের মতই হোয়াটসঅ্যাপ নম্বর অটো-ফিল করার লজিক
    function syncWhatsapp() {
        const sameAsMobile = document.getElementById('same-as-mobile').checked;
        if (sameAsMobile) {
            const mobileVal = document.getElementById('student-phone').value;
            document.getElementById('student-whatsapp').value = mobileVal;
        }
    }

    function toggleWhatsappSync() {
        const whatsappInput = document.getElementById('student-whatsapp');
        const sameAsMobile = document.getElementById('same-as-mobile').checked;
        if (sameAsMobile) {
            syncWhatsapp();
            whatsappInput.readOnly = true;
            whatsappInput.classList.add('bg-gray-50');
        } else {
            whatsappInput.readOnly = false;
            whatsappInput.classList.remove('bg-gray-50');
        }
    }

    function filterStudents() {
        const searchQuery = document.getElementById('search-student').value.toLowerCase().trim();
        const classQuery = document.getElementById('filter-class').value;
        renderStudentsList(searchQuery, classQuery);
    }

    async function renderStudentsList(searchQuery = '', classQuery = '') {
        const tableBody = document.getElementById('students-table-body');
        if (!tableBody) return;

        try {
            let students = await db.students.reverse().toArray();
            students = students.filter(student => student.is_deleted !== 1);

            // সার্চ ফিল্টারিং (আইডি, নাম, এবং অভিভাবকের ফোন)
            if (searchQuery) {
                students = students.filter(student =>
                    student.name.toLowerCase().includes(searchQuery) ||
                    student.id.toLowerCase().includes(searchQuery) ||
                    student.parent_phone.includes(searchQuery)
                );
            }

            if (classQuery) {
                students = students.filter(student => student.class === classQuery);
            }

            // সিরিয়াল নম্বর অনুযায়ী ছোট থেকে বড় সাজানো
            students.sort((a, b) => (a.serial_no || 0) - (b.serial_no || 0));

            if (students.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="8" class="px-4 py-8 text-center text-sm text-gray-500 font-medium">
                            কোনো শিক্ষার্থীর তথ্য পাওয়া যায়নি।
                        </td>
                    </tr>`;
                return;
            }

            let htmlContent = '';
            students.forEach(student => {
                const syncStatusBadge = student.is_synced === 1
                    ? `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800">
                         <i class="fa-solid fa-cloud-arrow-up"></i> সিঙ্কড
                       </span>`
                    : `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-800 animate-pulse">
                         <i class="fa-solid fa-clock"></i> পেন্ডিং
                       </span>`;

                htmlContent += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="px-4 py-3 text-sm text-gray-700 font-bold">${student.serial_no || '-'}</td>
                        <td class="px-4 py-3 text-sm text-gray-700 font-bold">${student.roll}</td>
                        <td class="px-4 py-3 text-sm">
                            <div class="font-semibold text-gray-800">${student.name}</div>
                            <div class="text-[10px] text-gray-400 font-bold tracking-wider">${student.id}</div>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-600">${student.father_name || '-'}</td>
                        <td class="px-4 py-3 text-sm text-gray-700 font-semibold">${student.class}</td>
                        <td class="px-4 py-3 text-xs text-gray-600">
                            <div><i class="fa-solid fa-phone text-emerald-600"></i> ${student.parent_phone}</div>
                            ${student.whatsapp_no ? `<div><i class="fa-brands fa-whatsapp text-green-500"></i> ${student.whatsapp_no}</div>` : ''}
                        </td>
                        <td class="px-4 py-3 text-sm">${syncStatusBadge}</td>
                        <td class="px-4 py-3 text-sm flex gap-1.5 h-full items-center">
                            <button onclick="editStudent('${student.id}')" class="text-blue-600 hover:text-blue-800 p-1.5 rounded hover:bg-blue-50 transition" title="সংশোধন">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button onclick="deleteStudent('${student.id}')" class="text-red-600 hover:text-red-800 p-1.5 rounded hover:bg-red-50 transition" title="মুছে ফেলুন">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>`;
            });

            tableBody.innerHTML = htmlContent;

        } catch (err) {
            console.error("শিক্ষার্থীর তালিকা রেন্ডার করতে সমস্যা হয়েছে:", err);
        }
    }

    async function editStudent(id) {
        try {
            const student = await db.students.get(id);
            if (!student) return;

            document.getElementById('editing-student-id').value = student.id;
            document.getElementById('student-id').value = student.id;
            document.getElementById('student-id').readOnly = true; // এডিটের সময় আইডি এডিট করা যাবে না

            document.getElementById('student-serial').value = student.serial_no || '';
            document.getElementById('student-name').value = student.name;
            document.getElementById('student-father-name').value = student.father_name || '';
            document.getElementById('student-roll').value = student.roll;
            document.getElementById('student-phone').value = student.parent_phone;
            document.getElementById('student-whatsapp').value = student.whatsapp_no || '';
            document.getElementById('student-address').value = student.address || '';

            // রেডিও বাটনে শ্রেণী সেট করা
            const radio = document.querySelector(`input[name="student-class"][value="${student.class}"]`);
            if (radio) radio.checked = true;

            // যদি হোয়াটসঅ্যাপ ও ফোন নম্বর একই হয়, তবে চেক বক্স অন করে দেওয়া
            if (student.parent_phone === student.whatsapp_no) {
                document.getElementById('same-as-mobile').checked = true;
                toggleWhatsappSync();
            } else {
                document.getElementById('same-as-mobile').checked = false;
                toggleWhatsappSync();
            }

            document.getElementById('form-title').innerHTML = `<i class="fa-solid fa-pen-to-square text-blue-600"></i> ছাত্র তথ্য সংশোধন`;
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.className = "w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2";
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> সংশোধন সম্পন্ন করুন`;

            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            document.getElementById('student-name').focus();

        } catch (err) {
            console.error("সংশোধন মোডে রূপান্তর করতে সমস্যা:", err);
        }
    }

    function cancelEdit() {
        document.getElementById('admission-form').reset();
        document.getElementById('editing-student-id').value = "";
        document.getElementById('student-id').readOnly = false;
        document.getElementById('same-as-mobile').checked = false;
        toggleWhatsappSync();

        document.getElementById('form-title').innerHTML = `<i class="fa-solid fa-user-plus text-emerald-600"></i> নতুন ছাত্র ভর্তি ফরম`;
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2";
        submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> ভর্তি নিশ্চিত করুন`;

        document.getElementById('cancel-edit-btn').classList.add('hidden');
        generateIdAndSerial();
    }

    async function deleteStudent(id) {
        if (!confirm("আপনি কি নিশ্চিতভাবে এই শিক্ষার্থীর তথ্য মুছে ফেলতে চান?")) return;

        try {
            await db.students.update(id, {
                is_deleted: 1,
                is_synced: 0
            });
            showToast("শিক্ষার্থীর তথ্য সফলভাবে মুছে ফেলা হয়েছে।", "success");

            if (document.getElementById('editing-student-id').value === id) {
                cancelEdit();
            }

            await renderStudentsList();

            if (typeof updatePendingCount === 'function') {
                await updatePendingCount();
            }

            if (navigator.onLine && typeof triggerAutoSync === 'function') {
                triggerAutoSync();
            }

        } catch (err) {
            console.error("মুছে ফেলার সময় সমস্যা হয়েছে:", err);
            showToast("তথ্যটি মুছে ফেলা সম্ভব হয়নি।", "error");
        }
    }
</script>
