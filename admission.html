<style>
    @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    #admission-container {
        font-family: 'Hind Siliguri', 'Inter', sans-serif;
    }
    .font-en {
        font-family: 'Inter', sans-serif;
    }
    .font-mono-receipt {
        font-family: 'JetBrains Mono', monospace;
    }
    
    /* ========================================================= */
    /* A5 পোর্ট্রেট প্রিন্টিং অপ্টিমাইজেশন মিডিয়া কোয়েরি */
    /* ========================================================= */
    @media print {
        @page {
            size: A5 portrait !important;
            margin: 0 !important; /* প্রিন্ট মার্জিন সম্পূর্ণ ব্রাউজার নিয়ন্ত্রিত */
        }
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }
        /* প্রিন্ট করার সময় মূল পেজের অন্য সব ব্যাকগ্রাউন্ড এলিমেন্ট হাইড */
        body * {
            visibility: hidden !important;
        }
        #sidebar, header, #admission-form, .bg-white, .no-print, button, .border-t {
            display: none !important;
            visibility: hidden !important;
        }
        html, body, main, #main-content, #admission-container {
            height: auto !important;
            min-height: 0 !important;
            overflow: visible !important;
            display: block !important;
            background: white !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        /* শুধুমাত্র প্রিন্ট রসিদটি ভিজিবল ও ফুল-পেজ ফিট করা */
        #print-receipt-modal {
            visibility: visible !important;
            position: absolute !important;
            left: 0 !important;
            top: 0 !important;
            width: 148mm !important;  /* A5 Standard Width */
            height: 210mm !important; /* A5 Standard Height */
            display: block !important;
            background: white !important;
            box-shadow: none !important;
            border: none !important;
            z-index: 999999 !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        #admission-receipt-print {
            visibility: visible !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
            width: 148mm !important;
            height: 210mm !important;
            box-sizing: border-box !important;
            padding: 8mm !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            background: white !important;
        }
        #admission-receipt-print * {
            visibility: visible !important;
        }
        #admission-receipt-print strong {
            font-size: 11px !important;
        }
        #admission-receipt-print span {
            font-size: 9px !important;
        }
        #admission-receipt-print img {
            width: 70px !important;
            height: 70px !important;
        }
    }
</style>

<div id="admission-container" class="space-y-6">

    <!-- ১. ছাত্র ভর্তি ফরম -->
    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-gray-100">
        <h3 id="form-title" class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2 border-b pb-3">
            <i class="fa-solid fa-user-plus text-emerald-600 text-2xl"></i> নতুন ছাত্র ভর্তি ফরম
        </h3>

        <form id="admission-form" class="space-y-6">
            <input type="hidden" id="editing-student-id" value="">

            <!-- Academics Section -->
            <div class="space-y-4 bg-emerald-50/40 p-5 rounded-2xl border border-emerald-100/50">
                <h4 class="text-sm font-extrabold text-emerald-800 uppercase tracking-wider pb-1.5 flex items-center gap-2">
                    <i class="fa-solid fa-sitemap text-emerald-600"></i> ১. অ্যাকাডেমিক ও ভর্তি তথ্য
                </h4>
                
                <div class="space-y-4">
                    <div id="branch-selector-container" class="space-y-2">
                        <label class="block text-sm font-bold text-gray-600">শাখা নির্বাচন করুন *</label>
                        <div id="dynamic-branches" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>
                    </div>

                    <div id="dept-selector-container" class="space-y-2 hidden">
                        <label class="block text-sm font-bold text-gray-600">বিভাগ নির্বাচন করুন *</label>
                        <div id="dynamic-depts" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>
                    </div>

                    <div id="class-selector-container" class="space-y-2 hidden">
                        <label class="block text-sm font-bold text-gray-600">শ্রেণী/জামাত নির্বাচন করুন *</label>
                        <div id="dynamic-classes" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>
                    </div>

                    <div id="group-selector-container" class="space-y-2 hidden">
                        <label class="block text-sm font-bold text-gray-600">গ্রুপ/সেকশন নির্বাচন করুন *</label>
                        <div id="dynamic-groups" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-2">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">আইডি নম্বর *</label>
                        <input type="text" id="student-id" required placeholder="S-10001"
                               class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">সিরিয়াল নম্বর *</label>
                        <input type="number" id="student-serial" required placeholder="সিরিয়াল"
                               class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold bg-gray-50 font-en" readonly>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">রোল নম্বর *</label>
                        <input type="number" id="student-roll" required placeholder="যেমন: ১০"
                               class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold font-en">
                    </div>
                </div>
            </div>

            <!-- Fee Section -->
            <div class="space-y-3 pt-2 bg-blue-50/40 p-5 rounded-2xl border border-blue-100/50">
                <h4 class="text-sm font-extrabold text-blue-800 uppercase tracking-wider pb-1.5 flex items-center gap-2">
                    <i class="fa-solid fa-money-check-dollar text-blue-600"></i> ২. বেতন ব্যবস্থা ও ফি গ্রুপ

            <!-- Personal Info Section -->

                </h4>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1">ছাত্রের নাম *</label>
                        <input type="text" id="student-name" required placeholder="যেমন: আবদুর রহমান"

                    <div>

                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">জন্ম তারিখ</label>
                        <input type="date" id="student-dob"
                               class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">রক্তের গ্রুপ</label>
                        <select id="student-blood-group"
                                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm bg-white font-semibold text-gray-700">
                            <option value="">নির্বাচন করুন</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">জন্ম নিবন্ধন নম্বর (১৭ ডিজিট)</label>
                        <input type="text" id="student-birth-reg" placeholder="যেমন: ২০০৫xxxxxxxxxxxxx" pattern="[0-9]{17}"
                               class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-en font-semibold">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">অভিভাবকের মোবাইল নম্বর *</label>
                        <input type="tel" id="student-phone" required placeholder="017XXXXXXXX" pattern="[0-9]{11}" oninput="window.syncWhatsapp()"
                               class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-en font-bold">
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <label class="block text-sm font-bold text-gray-500">হোয়াটসঅ্যাপ নম্বর</label>
                            <label class="inline-flex items-center gap-1 cursor-pointer text-[10px] text-emerald-700 font-bold">
                                <input type="checkbox" id="same-as-mobile" class="rounded text-emerald-600 focus:ring-emerald-500" onchange="window.toggleWhatsappSync()">
                                <span>একই নাম্বার</span>
                            </label>
                        </div>
                        <input type="tel" id="student-whatsapp" placeholder="017XXXXXXXX" pattern="[0-9]{11}"
                               class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs font-en font-bold">
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">ছাত্রের ছবি লিংক (ইমেজ URL)</label>
                        <div class="flex gap-2">
                            <input type="text" id="student-photo-url" oninput="window.updateStudentPhotoPreview()" placeholder="যেমন: https://i.ibb.co/..."
                                   class="flex-1 px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs font-mono font-semibold bg-white">
                            
                            <a href="https://www.hmsharif.com/p/umage.html" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2.5 rounded-xl text-xs transition flex items-center gap-1.5 shadow-sm shrink-0">
                                <i class="fa-solid fa-cloud-arrow-up"></i> ছবি আপলোড করুন
                            </a>

                            <div id="student-photo-preview-container" class="hidden shrink-0 flex items-center justify-center">
                                <img id="student-photo-preview" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-md bg-gray-100" src="" alt="Student">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-600">স্থায়ী/বর্তমান ঠিকানা *</label>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-1">গ্রাম/মহল্লা *</label>
                            <input type="text" id="student-village" required placeholder="যেমন: মদিনানগর"
                                   class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-1">ডাকঘর (পোস্ট) *</label>
                            <input type="text" id="student-post" required placeholder="যেমন: পোস্ট অফিস"
                                   class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-1">থানা *</label>
                            <input type="text" id="student-thana" required placeholder="যেমন: রূপগঞ্জ"
                                   class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-1">জেলা *</label>
                            <input type="text" id="student-district" required placeholder="যেমন: নারায়ণগঞ্জ"
                                   class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-sm font-semibold">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-3">
                <button type="submit" id="submit-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition duration-200 flex items-center justify-center gap-2 text-sm shadow-md shadow-emerald-700/10">
                    <i class="fa-solid fa-circle-check text-base"></i> ভর্তি নিশ্চিত করুন
                </button>
                <button type="button" id="cancel-edit-btn" onclick="window.cancelEdit()" class="hidden bg-gray-150 hover:bg-gray-200 text-gray-700 font-bold px-6 py-3.5 rounded-xl transition duration-200 text-sm border">
                    বাতিল করুন
                </button>
            </div>
        </form>
    </div>

    <!-- ২. ভর্তি হওয়া ছাত্রদের তালিকা -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col no-print">
        <h3 class="text-base font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-list-ul text-emerald-600"></i> ভর্তি হওয়া ছাত্রদের তালিকা
        </h3>

        <!-- সার্চ ও ফিল্টারিং প্যানেল -->
        <div class="mb-5 flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i>
                </span>
                <input type="text" id="search-student" oninput="window.filterStudents()" placeholder="নাম, আইডি বা মোবাইল নম্বর দিয়ে খুঁজুন..."
                       class="w-full pl-9 pr-4 py-2 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs">
            </div>
            <div class="w-full sm:w-44">
                <select id="filter-class" onchange="window.filterStudents()"
                        class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs bg-white font-semibold text-gray-700">

        <!-- রেসপনসিভ টেবিল কন্টেইনার -->

            <table class="min-w-full divide-y divide-gray-100">
                <thead class="bg-gray-50 sticky top-0 z-10">

                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">শিক্ষার্থীর পরিচিতি</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">পিতা ও মাতা</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">শাখা ও জামাত</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">যোগাযোগ ও ফিস</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">স্ট্যাটাস</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">অ্যাকশন</th>
                </tr>
                </thead>
                <tbody id="students-table-body" class="bg-white divide-y divide-gray-100 text-xs"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ========================================================== -->
<!-- ৩. A5 সাইজ ভর্তি রসিদ প্রিন্ট মডাল পপআপ -->
<!-- ========================================================== -->
<div id="print-receipt-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl p-4 max-w-lg w-full mx-4 shadow-2xl relative border border-gray-100 flex flex-col justify-between max-h-[95vh]">
        
        <!-- রসিদ প্রিন্ট এরিয়া -->
        <div class="overflow-y-auto flex-1 pr-1 custom-scroll">
            <div id="admission-receipt-print" class="bg-white p-4 rounded-xl border border-gray-50 space-y-4 text-gray-800 leading-relaxed font-sans max-w-[148mm] mx-auto min-h-[210mm] flex flex-col justify-between">
                <!-- ডাইনামিক রসিদ ডাটা স্ক্রিপ্ট দিয়ে এখানে লোড হবে -->
            </div>
        </div>

        <!-- রসিদ মডাল অ্যাকশন বাটনসমূহ -->
        <div class="flex gap-2 mt-4 border-t pt-3 bg-white no-print">
            <button id="btn-wa-send" onclick="window.sendReceiptToWhatsApp()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition">
                <i class="fa-brands fa-whatsapp text-sm"></i> হোয়াটসঅ্যাপ এ পাঠান
            </button>
            <button onclick="window.print()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition">
                <i class="fa-solid fa-print"></i> প্রিন্ট করুন (A5 Size)
            </button>
            <button onclick="window.closeReceiptModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-xs transition border">
                বন্ধ করুন
            </button>
        </div>
    </div>
</div>

<script>
(function() {
    let academicStructure = [];
    let feeGroups = [];

    let selectedBranchId = "";
    let selectedDeptId = "";
    let selectedClassId = "";
    let selectedGroupId = "";
    let selectedFeeGroupId = "";

    let activePrintedStudent = null;

    // ১. গ্লোবাল উইন্ডো অবজেক্টে প্রধান ইনিশিয়ালাইজার বাইন্ডিং
    window.initAdmission = async function() {
        document.getElementById('editing-student-id').value = "";
        document.getElementById('student-id').readOnly = false;

        const config = await db.settings.get('madrasah_config_block') || {};
        academicStructure = config.academic_structure ? JSON.parse(config.academic_structure) : [];
        feeGroups = config.fee_groups ? JSON.parse(config.fee_groups) : [];

        renderDynamicAcademicFields();
        renderDynamicFeeGroups();
        populateClassFilterOptions();

        await generateIdAndSerial();
        await renderStudentsList();

        const form = document.getElementById('admission-form');
        if (form) {
            form.onsubmit = async (e) => {
                e.preventDefault();

                const id = document.getElementById('student-id').value.trim();
                const serialNo = parseInt(document.getElementById('student-serial').value);
                const name = document.getElementById('student-name').value.trim();
                const fatherName = document.getElementById('student-father-name').value.trim();
                const motherName = document.getElementById('student-mother-name').value.trim();
                const dob = document.getElementById('student-dob').value;
                const bloodGroup = document.getElementById('student-blood-group').value;
                const birthReg = document.getElementById('student-birth-reg').value.trim();
                const roll = parseInt(document.getElementById('student-roll').value);
                const phone = document.getElementById('student-phone').value.trim();
                const whatsapp = document.getElementById('student-whatsapp').value.trim();
                
                const village = document.getElementById('student-village').value.trim();
                const post = document.getElementById('student-post').value.trim();
                const thana = document.getElementById('student-thana').value.trim();
                const district = document.getElementById('student-district').value.trim();

                const photoUrl = document.getElementById('student-photo-url').value.trim();
                const editId = document.getElementById('editing-student-id').value;

                const branchObj = academicStructure.find(b => b.id === selectedBranchId);
                const deptObj = branchObj ? branchObj.departments.find(d => d.id === selectedDeptId) : null;
                const classObj = deptObj ? deptObj.classes.find(c => c.id === selectedClassId) : null;
                const feeGroupObj = feeGroups.find(fg => fg.id === selectedFeeGroupId);

                if (!selectedBranchId || !selectedDeptId || !selectedClassId || !selectedFeeGroupId) {
                    showToast("শাখা, বিভাগ, শ্রেণী এবং ফি গ্রুপ অবশ্যই সিলেক্ট করতে হবে!", "error");
                    return;
                }

                const sBranch = branchObj.name;
                const sDept = deptObj.name;
                const sClass = classObj.name;
                const sGroup = selectedGroupId || "-"; 
                const sFeeGroupName = feeGroupObj.name;
                const sMonthlyFee = feeGroupObj.amount;

                const mergedAddress = `গ্রাম: ${village}, পোস্ট: ${post}, থানা: ${thana}, জেলা: ${district}`;

                try {
                    const duplicate = await db.students
                        .where({ class: sClass, roll: roll })
                        .first();

                    if (duplicate && duplicate.id !== editId && duplicate.is_deleted !== 1) {
                        if (duplicate.branch === sBranch) {
                            showToast(`দুঃখিত! ${sBranch} শাখার ${sClass} জামাতে রোল নম্বর ${roll} ইতিমধ্যে একজন শিক্ষার্থীর জন্য সংরক্ষিত।`, "error");
                            return;
                        }
                    }

                    const studentObj = {
                        id: id,
                        serial_no: serialNo,
                        name: name,
                        father_name: fatherName,
                        mother_name: motherName,
                        dob: dob,
                        blood_group: bloodGroup,
                        birth_reg: birthReg,
                        branch: sBranch,
                        department: sDept,
                        class: sClass,
                        group: sGroup,
                        roll: roll,
                        fee_group_id: selectedFeeGroupId,
                        fee_group_name: sFeeGroupName,
                        monthly_fee: sMonthlyFee,
                        parent_phone: phone,
                        whatsapp_no: whatsapp,
                        address: mergedAddress, 
                        village: village,       
                        post: post,
                        thana: thana,
                        district: district,
                        photo_url: photoUrl,
                        is_synced: 0,
                        is_deleted: 0
                    };

                    if (editId) {
                        await db.students.update(editId, studentObj);
                        showToast("শিক্ষার্থীর তথ্য সফলভাবে সংশোধন করা হয়েছে।", "success");
                        window.cancelEdit();
                    } else {
                        studentObj.admission_date = new Date().toISOString().split('T')[0];
                        await db.students.add(studentObj);
                        showToast("নতুন ছাত্র সফলভাবে ভর্তি করা হয়েছে।", "success");
                        form.reset();
                        window.clearLogoUrl();
                    }

                    await generateIdAndSerial();
                    await renderStudentsList();

                    // রসিদ পপআপ লোড করা
                    window.showReceiptModal(studentObj);

                    if (typeof updatePendingCount === 'function') {
                        await updatePendingCount();
                    }

                    if (navigator.onLine && typeof triggerAutoSync === 'function') {
                        triggerAutoSync();
                    }

                } catch (err) {
                    console.error("ভর্তি সংরক্ষণে ত্রুটি:", err);
                    showToast("তথ্য সংরক্ষণ করা যায়নি। পুনরায় চেষ্টা করুন।", "error");
                }
            };
        }
    };

    // ২. ডাইনামিক নির্ভরশীল বাটন রেন্ডারিং (Cascades)
    function renderDynamicAcademicFields() {
        const branchContainer = document.getElementById('dynamic-branches');
        if (!branchContainer) return;
        if (academicStructure.length === 0) {
            branchContainer.innerHTML = `<div class="col-span-full py-4 text-center text-xs text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation"></i> দয়া করে প্রথমে সেটিংসে গিয়ে শাখা ও অ্যাকাডেমিক কাঠামো তৈরি করুন!</div>`;
            return;
        }

        branchContainer.innerHTML = '';
        academicStructure.forEach(branch => {
            const isActive = selectedBranchId === branch.id;
            branchContainer.innerHTML += `
                <label class="cursor-pointer">
                    <input type="radio" name="academic-branch" value="${branch.id}" required class="sr-only" ${isActive ? 'checked' : ''} onchange="window.onBranchChange('${branch.id}')">
                    <div class="text-center py-2.5 rounded-xl border ${isActive ? 'border-emerald-600 bg-emerald-500 text-white font-extrabold shadow-sm' : 'border-gray-200 bg-white hover:bg-gray-50'} text-xs md:text-sm transition duration-150">
                        <span>${branch.name}</span>
                    </div>
                </label>`;
        });
    }

    window.onBranchChange = function(id) {
        selectedBranchId = id;
        selectedDeptId = "";
        selectedClassId = "";
        selectedGroupId = "";

        const deptS = document.getElementById('dept-selector-container');
        const classS = document.getElementById('class-selector-container');
        const groupS = document.getElementById('group-selector-container');

        if (deptS) deptS.classList.remove('hidden');
        if (classS) classS.classList.add('hidden');
        if (groupS) groupS.classList.add('hidden');

        renderDynamicAcademicFields();
        renderDynamicDepartments();
    };

    function renderDynamicDepartments() {
        const deptContainer = document.getElementById('dynamic-depts');
        if (!deptContainer) return;
        const activeBranch = academicStructure.find(b => b.id === selectedBranchId);
        if (!activeBranch) return;

        const depts = activeBranch.departments || [];
        deptContainer.innerHTML = '';

        if (depts.length === 0) {
            deptContainer.innerHTML = `<div class="col-span-full py-2 text-xs text-amber-600 font-bold">এই শাখার আন্ডারে কোনো বিভাগ তৈরি করা হয়নি।</div>`;
            return;
        }

        depts.forEach(dept => {
            const isActive = selectedDeptId === dept.id;
            deptContainer.innerHTML += `
                <label class="cursor-pointer">
                    <input type="radio" name="academic-dept" value="${dept.id}" required class="sr-only" ${isActive ? 'checked' : ''} onchange="window.onDeptChange('${dept.id}')">
                    <div class="text-center py-2.5 rounded-xl border ${isActive ? 'border-blue-600 bg-blue-500 text-white font-extrabold shadow-sm' : 'border-gray-200 bg-white hover:bg-gray-50'} text-xs md:text-sm transition duration-150">
                        <span>${dept.name}</span>
                    </div>
                </label>`;
        });
    }

    window.onDeptChange = function(id) {
        selectedDeptId = id;
        selectedClassId = "";
        selectedGroupId = "";

        const classS = document.getElementById('class-selector-container');
        const groupS = document.getElementById('group-selector-container');

        if (classS) classS.classList.remove('hidden');
        if (groupS) groupS.classList.add('hidden');

        renderDynamicDepartments();
        renderDynamicClasses();
    };

    function renderDynamicClasses() {
        const classContainer = document.getElementById('dynamic-classes');
        if (!classContainer) return;
        const activeBranch = academicStructure.find(b => b.id === selectedBranchId);
        const activeDept = activeBranch ? activeBranch.departments.find(d => d.id === selectedDeptId) : null;
        if (!activeDept) return;

        const classes = activeDept.classes || [];
        classContainer.innerHTML = '';

        if (classes.length === 0) {
            classContainer.innerHTML = `<div class="col-span-full py-2 text-xs text-amber-600 font-bold">এই বিভাগের আন্ডারে কোনো শ্রেণী তৈরি করা হয়নি।</div>`;
            return;
        }

        classes.forEach(cls => {
            const isActive = selectedClassId === cls.id;
            classContainer.innerHTML += `
                <label class="cursor-pointer">
                    <input type="radio" name="academic-class" value="${cls.id}" required class="sr-only" ${isActive ? 'checked' : ''} onchange="window.onClassChange('${cls.id}')">
                    <div class="text-center py-2.5 rounded-xl border ${isActive ? 'border-amber-600 bg-amber-500 text-white font-extrabold shadow-sm' : 'border-gray-200 bg-white hover:bg-gray-50'} text-xs md:text-sm transition duration-150">
                        <span>${cls.name}</span>
                    </div>
                </label>`;
        });
    }

    window.onClassChange = function(id) {
        selectedClassId = id;
        selectedGroupId = "";

        const groupS = document.getElementById('group-selector-container');
        if (groupS) groupS.classList.remove('hidden');

        renderDynamicClasses();
        renderDynamicGroups();
    };

    function renderDynamicGroups() {
        const groupContainer = document.getElementById('dynamic-groups');
        if (!groupContainer) return;
        const activeBranch = academicStructure.find(b => b.id === selectedBranchId);
        const activeDept = activeBranch ? activeBranch.departments.find(d => d.id === selectedDeptId) : null;
        const activeClass = activeDept ? activeDept.classes.find(c => c.id === selectedClassId) : null;
        if (!activeClass) return;

        const groups = activeClass.groups || [];
        groupContainer.innerHTML = '';

        if (groups.length === 0) {
            const groupS = document.getElementById('group-selector-container');
            if (groupS) groupS.classList.add('hidden');
            return;
        }

        groups.forEach(grp => {
            const isActive = selectedGroupId === grp;
            groupContainer.innerHTML += `
                <label class="cursor-pointer">
                    <input type="radio" name="academic-group" value="${grp}" class="sr-only" ${isActive ? 'checked' : ''} onchange="window.onGroupChange('${grp}')">
                    <div class="text-center py-2.5 rounded-xl border ${isActive ? 'border-purple-600 bg-purple-500 text-white font-extrabold shadow-sm' : 'border-gray-200 bg-white hover:bg-gray-50'} text-xs md:text-sm transition duration-150">
                        <span>${grp}</span>
                    </div>
                </label>`;
        });
    }

    window.onGroupChange = function(grp) {
        selectedGroupId = grp;
        renderDynamicGroups();
    };

    function renderDynamicFeeGroups() {
        const container = document.getElementById('dynamic-fee-groups');
        if (!container) return;
        if (feeGroups.length === 0) {
            container.innerHTML = `<div class="col-span-full py-4 text-center text-xs text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation"></i> দয়া করে প্রথমে সেটিংসে বেতন ও বোর্ডিং গ্রুপ তৈরি করুন!</div>`;
            return;
        }

        container.innerHTML = '';
        feeGroups.forEach(grp => {
            const isActive = selectedFeeGroupId === grp.id;
            container.innerHTML += `
                <label class="cursor-pointer">
                    <input type="radio" name="fee-group" value="${grp.id}" required class="sr-only" ${isActive ? 'checked' : ''} onchange="window.onFeeGroupChange('${grp.id}')">
                    <div class="text-center py-2.5 rounded-xl border ${isActive ? 'border-emerald-600 bg-emerald-500 text-white font-extrabold shadow-sm' : 'border-gray-200 bg-white hover:bg-gray-50'} text-xs md:text-sm transition duration-150">
                        <div class="font-bold">${grp.name}</div>
                        <div class="text-[10px] ${isActive ? 'text-emerald-100' : 'text-gray-400'} font-en font-bold">৳ ${parseFloat(grp.amount).toLocaleString('bn-BD')}</div>
                    </div>
                </label>`;
        });
    }

    window.onFeeGroupChange = function(id) {
        selectedFeeGroupId = id;
        renderDynamicFeeGroups();
    };

    // ৩. লোগো এবং ফোন নাম্বার সিঙ্ক্রোনাইজেশন ও উইন্ডো এক্সপোজ
    window.updateStudentPhotoPreview = function() {
        const urlInput = document.getElementById('student-photo-url');
        if (!urlInput) return;
        const url = urlInput.value.trim();
        const previewContainer = document.getElementById('student-photo-preview-container');
        const previewImg = document.getElementById('student-photo-preview');
        
        if (url && previewContainer && previewImg) {
            previewImg.src = url;
            previewContainer.classList.remove('hidden');
            previewImg.onerror = function() {
                previewContainer.classList.add('hidden');
                showToast("ভুল ইমেজ লিংক! লোড হচ্ছে না।", "error");
            };
        } else if (previewContainer) {
            previewContainer.classList.add('hidden');
        }
    };

    window.clearLogoUrl = function() {
        const urlInput = document.getElementById('student-photo-url');
        if (urlInput) {
            urlInput.value = '';
            window.updateStudentPhotoPreview();
        }
    };

    function refinePhoneNumber(phone) {
        if (!phone) return "";
        let clean = phone.toString().replace(/\D/g, ''); 
        if (clean.startsWith('8801')) {
            clean = clean.substring(2);
        }
        if (!clean.startsWith('01') && clean.length === 10) {
            clean = '0' + clean;
        }
        return clean; 
    }

    window.syncWhatsapp = function() {
        const sameAsMobile = document.getElementById('same-as-mobile').checked;
        if (sameAsMobile) {
            const rawPhone = document.getElementById('student-phone').value;
            document.getElementById('student-whatsapp').value = refinePhoneNumber(rawPhone);
        }
    };

    window.toggleWhatsappSync = function() {
        const whatsappInput = document.getElementById('student-whatsapp');
        const sameAsMobile = document.getElementById('same-as-mobile').checked;
        if (sameAsMobile) {
            window.syncWhatsapp();
            if (whatsappInput) {
                whatsappInput.readOnly = true;
                whatsappInput.classList.add('bg-gray-50');
            }
        } else if (whatsappInput) {
            whatsappInput.readOnly = false;
            whatsappInput.classList.remove('bg-gray-50');
        }
    };

    // ৪. ইউনিক আইডি ও সর্বোচ্চ সিরিয়াল নির্ধারণ (Bag-Free ID Generation)
    async function generateIdAndSerial() {
        try {
            const students = await db.students.toArray();
            
            // ডাটাবেজের সর্বোচ্চ সিরিয়াল নম্বর অনুসন্ধান
            const maxSerial = students.reduce((max, s) => ((s.serial_no || 0) > max ? s.serial_no : max), 0);
            const nextSerial = maxSerial + 1;
            
            const sSerial = document.getElementById('student-serial');
            const sId = document.getElementById('student-id');
            
            if (sSerial) sSerial.value = nextSerial;
            
            // ইউনিক অফলাইন-সেফ আইডি জেনারেশন (TIMESTAMP + RANDOM SUFFIX)
            const randomSuffix = Math.random().toString(36).substring(2, 5).toUpperCase();
            const generatedId = "S-" + (10000 + nextSerial) + "-" + randomSuffix;
            if (sId) sId.value = generatedId;
        } catch (err) {
            console.error("আইডি ও সিরিয়াল নম্বর জেনারেট করতে ব্যর্থ:", err);
        }
    }

    function populateClassFilterOptions() {
        const filterSelect = document.getElementById('filter-class');
        if (!filterSelect) return;
        filterSelect.innerHTML = `<option value="">সকল জামাত/শ্রেণী</option>`;
        
        const classesSet = new Set();
        academicStructure.forEach(branch => {
            branch.departments.forEach(dept => {
                dept.classes.forEach(cls => {
                    classesSet.add(cls.name);
                });
            });
        });

        classesSet.forEach(className => {
            filterSelect.innerHTML += `<option value="${className}">${className}</option>`;
        });
    }

    window.filterStudents = function() {
        const searchInput = document.getElementById('search-student');
        const classFilter = document.getElementById('filter-class');
        const searchQuery = searchInput ? searchInput.value.toLowerCase().trim() : '';
        const classQuery = classFilter ? classFilter.value : '';
        renderStudentsList(searchQuery, classQuery);
    };

    // ৫. ছাত্র তালিকা রেন্ডার করার নিরাপদ লজিক (Empty / Null-Check Added)
    async function renderStudentsList(searchQuery = '', classQuery = '') {
        const tableBody = document.getElementById('students-table-body');
        if (!tableBody) return;

        try {
            let students = await db.students.reverse().toArray();
            students = students.filter(student => student.is_deleted !== 1);

            if (searchQuery) {
                students = students.filter(student =>
                    (student.name || '').toLowerCase().includes(searchQuery) ||
                    (student.id || '').toLowerCase().includes(searchQuery) ||
                    (student.parent_phone || '').includes(searchQuery)
                );
            }

            if (classQuery) {
                students = students.filter(student => student.class === classQuery);
            }

            students.sort((a, b) => (a.serial_no || 0) - (b.serial_no || 0));

            if (students.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-4 py-8 text-center text-xs text-gray-500 font-medium">
                            কোনো শিক্ষার্থীর তথ্য পাওয়া যায়নি।
                        </td>
                    </tr>`;
                return;
            }

            let htmlContent = '';
            students.forEach(student => {
                const syncStatusBadge = student.is_synced === 1
                    ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-800">
                         <i class="fa-solid fa-cloud-arrow-up"></i> সিঙ্কড
                       </span>`
                    : `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-100 text-amber-800 animate-pulse">
                         <i class="fa-solid fa-clock"></i> পেন্ডিং
                       </span>`;

                htmlContent += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="px-4 py-3 text-xs text-gray-700 font-bold font-en">
                            <div>রোল: ${student.roll || '-'}</div>
                            <div class="text-[10px] text-gray-400 font-bold tracking-wider font-en">${student.id}</div>
                        </td>
                        <td class="px-4 py-3 text-xs">
                            <div class="flex items-center gap-2">
                                ${student.photo_url ? `<img class="w-8 h-8 rounded-full object-cover border" src="${student.photo_url}">` : '<div class="w-8 h-8 rounded-full bg-emerald-50 text-emerald-700 flex items-center justify-center font-bold font-en text-[10px]">St</div>'}
                                <div>
                                    <div class="font-bold text-gray-800 text-sm">${student.name || 'অজানা'}</div>
                                    <div class="text-[10px] text-gray-400 font-bold">Sl: ${student.serial_no || '-'}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-xs text-gray-600">
                            <div class="font-medium">পিতা: ${student.father_name || '-'}</div>
                            <div class="text-[10px] text-gray-500">মাতা: ${student.mother_name || '-'}</div>
                        </td>
                        <td class="px-4 py-3 text-xs text-gray-700 font-bold">
                            <div class="text-emerald-950">${student.class || '-'} ${student.group && student.group !== '-' ? `(${student.group})` : ''}</div>
                            <div class="text-[10px] font-normal text-gray-400">${student.branch || 'অজানা'} | ${student.department || '-'}</div>
                        </td>
                        <td class="px-4 py-3 text-xs">
                            <div class="font-en text-gray-600"><i class="fa-solid fa-phone text-emerald-600"></i> ${student.parent_phone || '-'}</div>
                            <div class="text-[10px] font-bold text-emerald-800">${student.fee_group_name || 'সাধারণ'}: ৳${student.monthly_fee || 0}</div>
                        </td>
                        <td class="px-4 py-3 text-xs">${syncStatusBadge}</td>
                        <td class="px-4 py-3 text-xs">
                            <div class="flex gap-1">
                                <button onclick="window.showReceiptModalFromList('${student.id}')" class="text-emerald-600 hover:text-emerald-800 p-1.5 rounded hover:bg-emerald-50 transition" title="রসিদ প্রিন্ট">
                                    <i class="fa-solid fa-receipt"></i>
                                </button>
                                <button onclick="window.editStudent('${student.id}')" class="text-blue-600 hover:text-blue-800 p-1.5 rounded hover:bg-blue-50 transition" title="সংশোধন">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button onclick="window.deleteStudent('${student.id}')" class="text-red-600 hover:text-red-800 p-1.5 rounded hover:bg-red-50 transition" title="মুছে ফেলুন">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });

            tableBody.innerHTML = htmlContent;

        } catch (err) {
            console.error("শিক্ষার্থীর তালিকা রেন্ডার করতে সমস্যা হয়েছে:", err);
        }
    }

    // ৬. শিক্ষার্থীর ডাটা এডিট মোডে রূপান্তর (উইন্ডো এক্সপোজ)
    window.editStudent = async function(id) {
        try {
            const student = await db.students.get(id);
            if (!student) return;

            document.getElementById('editing-student-id').value = student.id;
            document.getElementById('student-id').value = student.id;
            document.getElementById('student-id').readOnly = true;

            document.getElementById('student-serial').value = student.serial_no || '';
            document.getElementById('student-name').value = student.name || '';
            document.getElementById('student-father-name').value = student.father_name || '';
            document.getElementById('student-mother-name').value = student.mother_name || '';
            document.getElementById('student-dob').value = student.dob || '';
            document.getElementById('student-blood-group').value = student.blood_group || '';
            document.getElementById('student-birth-reg').value = student.birth_reg || '';
            document.getElementById('student-roll').value = student.roll || '';
            
            // পৃথক ঠিকানা উইজেট লোড
            if (student.village) {
                document.getElementById('student-village').value = student.village;
                document.getElementById('student-post').value = student.post;
                document.getElementById('student-thana').value = student.thana;
                document.getElementById('student-district').value = student.district;
            } else if (student.address) {
                document.getElementById('student-village').value = student.address;
            }

            document.getElementById('student-phone').value = student.parent_phone || '';
            document.getElementById('student-whatsapp').value = student.whatsapp_no || '';
            document.getElementById('student-photo-url').value = student.photo_url || '';

            window.updateStudentPhotoPreview();

            // ডাইনামিক বাটনগুলোর সিলেকশন সচল করা
            const branchObj = academicStructure.find(b => b.name === student.branch);
            if (branchObj) {
                selectedBranchId = branchObj.id;
                const deptContainer = document.getElementById('dept-selector-container');
                if (deptContainer) deptContainer.classList.remove('hidden');
                renderDynamicDepartments();

                const deptObj = branchObj.departments.find(d => d.name === student.department);
                if (deptObj) {
                    selectedDeptId = deptObj.id;
                    const classContainer = document.getElementById('class-selector-container');
                    if (classContainer) classContainer.classList.remove('hidden');
                    renderDynamicClasses();

                    const classObj = deptObj.classes.find(c => c.name === student.class);
                    if (classObj) {
                        selectedClassId = classObj.id;
                        const groupContainer = document.getElementById('group-selector-container');
                        if (groupContainer) groupContainer.classList.remove('hidden');
                        renderDynamicGroups();
                        selectedGroupId = student.group || "-";
                    }
                }
            }

            selectedFeeGroupId = student.fee_group_id || "";
            renderDynamicAcademicFields();
            renderDynamicFeeGroups();

            const sameAsMobileCheckbox = document.getElementById('same-as-mobile');
            if (sameAsMobileCheckbox) {
                if (student.parent_phone === student.whatsapp_no) {
                    sameAsMobileCheckbox.checked = true;
                    window.toggleWhatsappSync();
                } else {
                    sameAsMobileCheckbox.checked = false;
                    window.toggleWhatsappSync();
                }
            }

            const title = document.getElementById('form-title');
            if (title) title.innerHTML = `<i class="fa-solid fa-pen-to-square text-blue-600"></i> ছাত্র তথ্য সংশোধন`;
            
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) {
                submitBtn.className = "flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition duration-200 flex items-center justify-center gap-2 text-sm";
                submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> সংশোধন সম্পন্ন করুন`;
            }

            const cancelBtn = document.getElementById('cancel-edit-btn');
            if (cancelBtn) cancelBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' }); 

        } catch (err) {
            console.error("সংশোধন মোডে রূপান্তর করতে সমস্যা:", err);
        }
    };

    window.cancelEdit = function() {
        const form = document.getElementById('admission-form');
        if (form) form.reset();
        
        document.getElementById('editing-student-id').value = "";
        document.getElementById('student-id').readOnly = false;
        
        const sameAsMobileCheckbox = document.getElementById('same-as-mobile');
        if (sameAsMobileCheckbox) sameAsMobileCheckbox.checked = false;
        
        window.toggleWhatsappSync();
        window.clearLogoUrl();

        selectedBranchId = "";
        selectedDeptId = "";
        selectedClassId = "";
        selectedGroupId = "";
        selectedFeeGroupId = "";

        const deptContainer = document.getElementById('dept-selector-container');
        const classContainer = document.getElementById('class-selector-container');
        const groupContainer = document.getElementById('group-selector-container');

        if (deptContainer) deptContainer.classList.add('hidden');
        if (classContainer) classContainer.classList.add('hidden');
        if (groupContainer) groupContainer.classList.add('hidden');

        const title = document.getElementById('form-title');
        if (title) title.innerHTML = `<i class="fa-solid fa-user-plus text-emerald-600"></i> নতুন ছাত্র ভর্তি ফরম`;
        
        const submitBtn = document.getElementById('submit-btn');
        if (submitBtn) {
            submitBtn.className = "flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition duration-200 flex items-center justify-center gap-2 text-sm shadow-md shadow-emerald-700/10";
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> ভর্তি নিশ্চিত করুন`;
        }

        const cancelBtn = document.getElementById('cancel-edit-btn');
        if (cancelBtn) cancelBtn.classList.add('hidden');
        
        renderDynamicAcademicFields();
        renderDynamicFeeGroups();
        generateIdAndSerial();
    };

    window.deleteStudent = async function(id) {
        if (!confirm("আপনি কি নিশ্চিতভাবে এই শিক্ষার্থীর তথ্য মুছে ফেলতে চান?")) return;

        try {
            await db.students.update(id, {
                is_deleted: 1,
                is_synced: 0
            });
            showToast("শিক্ষার্থীর তথ্য সফলভাবে মুছে ফেলা হয়েছে।", "success");

            if (document.getElementById('editing-student-id').value === id) {
                window.cancelEdit();
            }

            await renderStudentsList();

            if (typeof updatePendingCount === 'function') {
                await updatePendingCount();
            }

            if (navigator.onLine && typeof triggerAutoSync === 'function') {
                triggerAutoSync();
            }

        } catch (err) {
            console.error("মুছে ফেলার সময় সমস্যা হয়েছে:", err);
            showToast("তথ্যটি মুছে ফেলা সম্ভব হয়নি।", "error");
        }
    };

    // ৭. A5 পোর্ট্রেট প্রিন্ট রসিদ জেনারেটর (বডি হ্যাক রিমুভড, পারফেক্ট মার্জিনস)
    window.showReceiptModal = function(student) {
        activePrintedStudent = student;

        const madrasahName = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';
        const madrasahAddress = localStorage.getItem('madrasah_address') || 'ঢাকা, বাংলাদেশ';
        const madrasahPhone = localStorage.getItem('madrasah_phone') || '';
        const logoUrl = localStorage.getItem('madrasah_logo') || '';

        const receiptPrintArea = document.getElementById('admission-receipt-print');
        
        receiptPrintArea.innerHTML = `
            <div class="flex items-center justify-between border-b-2 border-emerald-800 pb-3">
                <div class="flex items-center gap-3">
                    ${logoUrl ? `<img class="w-14 h-14 rounded-full object-cover border" src="${logoUrl}">` : '<div class="w-14 h-14 rounded-full bg-emerald-100 text-emerald-800 flex items-center justify-center text-xl font-bold font-sans">M</div>'}
                    <div>
                        <h2 class="text-base font-bold text-emerald-900">${madrasahName}</h2>
                        <p class="text-[10px] text-gray-500">${madrasahAddress}</p>
                        ${madrasahPhone ? `<p class="text-[9px] text-gray-500 font-en">হেল্পলাইন: ${madrasahPhone}</p>` : ''}
                    </div>
                </div>
                <div class="text-right">
                    <h3 class="text-sm font-bold bg-emerald-850 text-white px-3 py-1 rounded inline-block">ভর্তি রসিদ</h3>
                    <p class="text-[9px] text-gray-400 mt-1 font-en">তারিখ: ${new Date().toLocaleDateString('bn-BD')}</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 py-4 border-b border-dashed text-xs text-gray-700">
                <div class="md:col-span-1 flex flex-col items-center justify-start border-r pr-2 border-gray-150">
                    ${student.photo_url ? `<img class="w-24 h-24 rounded-lg object-cover border shadow-sm" src="${student.photo_url}">` : '<div class="w-24 h-24 rounded-lg bg-gray-100 border text-gray-400 flex flex-col items-center justify-center gap-1"><i class="fa-solid fa-user text-xl"></i><span class="text-[9px]">ছবি নেই</span></div>'}
                    <div class="mt-2 text-center">
                        <div class="text-[10px] text-gray-400">সিরিয়াল নং</div>
                        <strong class="font-en text-gray-700">${student.serial_no}</strong>
                    </div>
                </div>

                <div class="md:col-span-3 grid grid-cols-2 gap-y-2.5">
                    <div>
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">শিক্ষার্থীর আইডি</span>
                        <strong class="text-emerald-950 font-en text-xs">${student.id}</strong>
                    </div>
                    <div>
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">রোল নম্বর</span>
                        <strong class="font-en text-xs">${student.roll}</strong>
                    </div>
                    <div class="col-span-2">
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">শিক্ষার্থীর নাম</span>
                        <strong class="text-sm text-gray-800">${student.name}</strong>
                    </div>
                    <div>
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">পিতার নাম</span>
                        <strong>${student.father_name || '-'}</strong>
                    </div>
                    <div>
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">মাতার নাম</span>
                        <strong>${student.mother_name || '-'}</strong>
                    </div>
                    <div>
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">শ্রেণী ও শাখা</span>
                        <strong class="text-emerald-800">${student.class} (${student.branch})</strong>
                    </div>
                    <div>
                        <span class="text-gray-400 block text-[10px] uppercase font-bold">গ্রুপ ও ফি গ্রুপ</span>
                        <strong>${student.group || '-'} | ${student.fee_group_name || 'সাধারণ'}</strong>
                    </div>
                    <div>
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">মাসিক ফিস (বেতন)</span>
                        <strong class="font-en text-emerald-800">৳ ${parseFloat(student.monthly_fee || 0).toLocaleString('bn-BD')}</strong>
                    </div>
                    <div>
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">মোবাইল নম্বর</span>
                        <strong class="font-en">${student.parent_phone}</strong>
                    </div>
                    <div class="col-span-2">
                        <span class="text-gray-400 block text-[9px] font-bold uppercase">বর্তমান ঠিকানা</span>
                        <strong>${student.address || '-'}</strong>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-end pt-10">
                <div class="flex justify-between items-center text-[10px] text-gray-500">
                    <div class="text-center w-36 border-t pt-1 border-gray-300">
                        <p class="font-bold">অভিভাবকের স্বাক্ষর</p>
                    </div>
                    <div class="text-center w-36 border-t pt-1 border-emerald-800 text-emerald-800">
                        <p class="font-bold">অনুমোদনকারীর স্বাক্ষর</p>
                    </div>
                </div>
                
                <div class="text-center text-[9px] text-gray-400 pt-6 border-t border-dashed mt-6">
                    জাজাকুমুল্লাহু খাইরান! আপনার সন্তানের শিক্ষাজীবন সাফল্যমণ্ডিত ও বরকতময় হোক।
                </div>
            </div>
        `;

        const modal = document.getElementById('print-receipt-modal');
        if (modal) modal.classList.remove('hidden');
    };

    window.showReceiptModalFromList = async function(studentId) {
        const studentObj = await db.students.get(studentId);
        if (studentObj) {
            window.showReceiptModal(studentObj);
        }
    };

    window.closeReceiptModal = function() {
        const modal = document.getElementById('print-receipt-modal');
        if (modal) modal.classList.add('hidden');
        activePrintedStudent = null;
    };

    window.sendReceiptToWhatsApp = function() {
        if (!activePrintedStudent) return;

        const phoneNum = activePrintedStudent.parent_phone;
        const refinedPhone = refinePhoneNumber(phoneNum); 

        let waNumber = refinedPhone;
        if (refinedPhone.startsWith('0')) {
            waNumber = '88' + refinedPhone; 
        }

        const madrasahName = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';

        const wpMessage = `প্রিয় অভিভাবক,
আপনার সন্তান ${activePrintedStudent.name} কে
${madrasahName} এ ভর্তি সম্পন্ন করা হয়েছে

আইডি/রোলঃ ${activePrintedStudent.id} / ${activePrintedStudent.roll}
শ্রেনী/জামাতঃ ${activePrintedStudent.class}

ধন্যবাদ।`;

        const wpUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(wpMessage)}`;
        window.open(wpUrl, '_blank');
    };
})();
</script>
