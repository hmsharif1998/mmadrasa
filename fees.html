<style>
    @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    #fees-container {
        font-family: 'Hind Siliguri', 'Inter', sans-serif;
    }
    .font-en {
        font-family: 'Inter', sans-serif;
    }
    .font-mono-receipt {
        font-family: 'JetBrains Mono', monospace;
    }

    /* ========================================================= */
    /* থার্মাল রোল পেপার (80mm/58mm standard) প্রিন্ট অপ্টিমাইজেশন */
    /* ========================================================= */
    @media print {
        @page {
            size: 80mm auto !important; /* ৮০মিমি স্ট্যান্ডার্ড থার্মাল রোল */
            margin: 0 !important;
        }
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }
        /* প্রিন্ট করার সময় মূল ব্যাকগ্রাউন্ড ও ন্যাভিগেশন সম্পূর্ণ হাইড */
        body * {
            visibility: hidden !important;
        }
        #sidebar, header, #fees-container, .no-print, button, .border-t {
            display: none !important;
            visibility: hidden !important;
        }
        html, body, main, #main-content {
            height: auto !important;
            min-height: 0 !important;
            overflow: visible !important;
            display: block !important;
            background: white !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        /* রসিদ এরিয়া ফুল পেজে ফিট করা */
        #receipt-modal {
            visibility: visible !important;
            position: absolute !important;
            left: 0 !important;
            top: 0 !important;
            width: 80mm !important;
            display: block !important;
            background: white !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        #receipt-print-area {
            visibility: visible !important;
            width: 80mm !important;
            box-sizing: border-box !important;
            padding: 4mm !important;
            margin: 0 !important;
            background: white !important;
        }
        #receipt-print-area * {
            visibility: visible !important;
        }
        .no-print, button, .no-print * {
            display: none !important;
            visibility: hidden !important;
        }
    }
</style>

<div id="fees-container" class="grid grid-cols-1 lg:grid-cols-3 gap-6 transition-all duration-300">

    <!-- বেতন আদায় ফরম -->

        <h3 id="fee-form-title" class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-2 border-b pb-3">
            <i class="fa-solid fa-money-bill-wave text-emerald-600 text-2xl"></i> নতুন বেতন কালেকশন
        </h3>

        <form id="fees-form" class="space-y-4">
            <input type="hidden" id="editing-receipt-id" value="">

            <!-- খোঁজার সুবিধাসহ শিক্ষার্থী সিলেক্টর (Autocomplete Search) -->

                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input type="text" id="student-search-input" oninput="window.searchStudentsForFee()" placeholder="নাম, রোল, আইডি বা মোবাইল..."

            <!-- বেতন, জরিমানা ও ছাড় এর ঘরসমূহ -->

<div id="receipt-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl relative border border-gray-150 flex flex-col max-h-[90vh]">
        
         <div class="overflow-y-auto flex-1 custom-scroll pr-1">
             <div id="receipt-print-area" class="bg-white p-2 font-mono-receipt text-[11px] text-gray-800 space-y-3 leading-relaxed">
                 <!-- ডাইনামিক রসিদ ডাটা স্ক্রিপ্ট দিয়ে এখানে লোড হবে -->
             </div>
         </div>
        
        <div class="flex gap-2 mt-5 border-t pt-4 no-print bg-white">
            <button id="btn-wa-fee" onclick="window.sendFeeReceiptToWhatsApp()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition">
                <i class="fa-brands fa-whatsapp text-sm"></i> হোয়াটসঅ্যাপ
            </button>
            <button onclick="window.print()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition">
                <i class="fa-solid fa-print text-[11px]"></i> প্রিন্ট করুন
            </button>
            <button onclick="window.closeReceiptModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-xs transition border">
                বন্ধ করুন
            </button>
        </div>
    </div>
</div>

<script>
(function() {
    let allActiveStudents = [];
    let activePrintedFee = null; 

    // ১. গ্লোবাল উইন্ডো অবজেক্টে মূল ইনিশিয়ালাইজার বাইন্ডিং
    window.initFees = async function() {
        document.getElementById('editing-receipt-id').value = "";

        const dateInput = document.getElementById('fee-date');
        if (dateInput) {
            dateInput.value = new Date().toISOString().split('T')[0];
        }

        await loadActiveStudents();
        await window.renderFeesList();

        if (window.preselectedStudentId) {
            const student = allActiveStudents.find(s => s.id === window.preselectedStudentId);
            if (student) {
                window.selectStudentForFee(student.id, student.name, student.class, student.roll);
            }
            window.preselectedStudentId = null;
        }

        document.addEventListener('click', function(e) {
            const list = document.getElementById('student-search-results');
            const input = document.getElementById('student-search-input');
            if (list && e.target !== input && !list.contains(e.target)) {
                list.classList.add('hidden');
            }
        });

        const form = document.getElementById('fees-form');
        if (form) {
            form.onsubmit = async (e) => {
                e.preventDefault();

                const studentId = document.getElementById('fee-student-id').value;
                const amount = parseFloat(document.getElementById('fee-amount').value) || 0;
                const fine = parseFloat(document.getElementById('fee-fine').value) || 0;
                const discount = parseFloat(document.getElementById('fee-discount').value) || 0;
                const month = document.getElementById('fee-month').value;
                const method = document.getElementById('fee-method').value;
                const paymentDate = document.getElementById('fee-date').value;
                const note = document.getElementById('fee-note').value.trim();
                const editReceiptId = document.getElementById('editing-receipt-id').value;
                const total = amount + fine - discount;

                if (!studentId || amount < 0 || !month || !paymentDate || !method) {
                    showToast("সব লাল চিহ্নিত (*) ঘরগুলো সঠিকভাবে পূরণ করুন!", "error");
                    return;
                }

                const student = allActiveStudents.find(s => s.id === studentId);
                const studentName = student ? student.name : "অজানা ছাত্র";
                const studentClass = student ? student.class : "";
                const studentRoll = student ? student.roll : "";
                const studentPhone = student ? student.parent_phone : "";

                try {
                    let receiptIdToPrint = editReceiptId;
                    const feeObj = {
                        student_id: studentId,
                        student_name: studentName,
                        student_class: studentClass,
                        student_roll: studentRoll,
                        parent_phone: studentPhone,
                        amount: amount,
                        fine: fine,
                        discount: discount,
                        total: total,
                        month: month,
                        method: method,
                        payment_date: paymentDate,
                        note: note,
                        is_synced: 0
                    };

                    if (editReceiptId) {
                        await db.fees.update(editReceiptId, feeObj);
                        showToast("বেতন আদায়ের তথ্য সফলভাবে সংশোধন করা হয়েছে।", "success");
                        window.cancelFeeEdit();
                    } else {
                        const receiptId = 'R-' + Date.now();
                        receiptIdToPrint = receiptId;
                        feeObj.receipt_id = receiptId;
                        feeObj.is_deleted = 0;

                        await db.fees.add(feeObj);
                        showToast("বেতন কালেকশন সফলভাবে সম্পন্ন হয়েছে।", "success");
                        form.reset();
                        document.getElementById('student-quick-info').classList.add('hidden');
                        document.getElementById('fee-total').textContent = "0";
                        if (dateInput) {
                            dateInput.value = new Date().toISOString().split('T')[0];
                        }
                    }

                    await window.renderFeesList();
                    window.showReceiptModal(receiptIdToPrint);

                    if (typeof updatePendingCount === 'function') {
                        await updatePendingCount();
                    }

                    if (navigator.onLine && typeof triggerAutoSync === 'function') {
                        triggerAutoSync();
                    }

                } catch (err) {
                    console.error("বেতন সংগ্রহ/সংশোধন করতে সমস্যা হয়েছে:", err);
                    showToast("দুঃখিত, তথ্য সংরক্ষণ করা সম্ভব হয়নি। আবার চেষ্টা করুন।", "error");
                }
            };
        }
    };

    async function loadActiveStudents() {
        try {
            const students = await db.students.toArray();
            allActiveStudents = students.filter(student => student.is_deleted !== 1);
        } catch (err) {
            console.error("ছাত্রদের ডাটা মেমরিতে লোড করতে ত্রুটি:", err);
        }
    }

    // ২. নিরাপদ ও ক্র্যাশ-মুক্ত শিক্ষার্থীর Autocomplete সার্চ (String safe-cast applied)
    window.searchStudentsForFee = function() {
        const queryInput = document.getElementById('student-search-input');
        if (!queryInput) return;
        const query = queryInput.value.toLowerCase().trim();
        const resultsContainer = document.getElementById('student-search-results');
        if (!resultsContainer) return;
        
        if (!query) {
            resultsContainer.classList.add('hidden');
            return;
        }

        const filtered = allActiveStudents.filter(s => 
            (s.name || '').toLowerCase().includes(query) || 
            String(s.roll || '').includes(query) || // 🚀 রোল ফাকা থাকলেও এখন জাভাস্ক্রিপ্ট ক্র্যাশ করবে না
            (s.id || '').toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            resultsContainer.innerHTML = `<div class="p-3 text-xs text-gray-400 text-center">কোনো ছাত্র পাওয়া যায়নি</div>`;
            resultsContainer.classList.remove('hidden');
            return;
        }

        let html = '';
        filtered.slice(0, 10).forEach(s => {
            html += `
                <div onclick="window.selectStudentForFee('${s.id}', '${s.name}', '${s.class}', '${s.roll || ''}')" class="p-3 hover:bg-emerald-50/50 cursor-pointer text-xs transition duration-150 border-b">
                    <span class="font-bold text-emerald-950 text-sm">${s.name}</span> 
                    <span class="text-gray-400 text-[11px] ml-1">(${s.class} | রোল: ${s.roll || '-'} | ID: ${s.id})</span>
                </div>`;
        });

        resultsContainer.innerHTML = html;
        resultsContainer.classList.remove('hidden');
    };

    function refinePhoneNumber(phone) {
        if (!phone) return "";
        let clean = phone.toString().replace(/\D/g, ''); 
        if (clean.startsWith('8801')) {
            clean = clean.substring(2);
        }
        if (!clean.startsWith('01') && clean.length === 10) {
            clean = '0' + clean;
        }
        return clean; 
    }

    // ৩. বেতন গ্রুপ অনুযায়ী অটো-পপুলেশন মেকানিজম
    window.selectStudentForFee = async function(id, name, studentClass, roll) {
        const student = allActiveStudents.find(s => s.id === id);
        if (!student) return;

        const sIdInput = document.getElementById('fee-student-id');
        const sSearchInput = document.getElementById('student-search-input');
        const sResults = document.getElementById('student-search-results');

        if (sIdInput) sIdInput.value = id;
        if (sSearchInput) sSearchInput.value = `${name} (${studentClass} - রোল: ${roll || '-'})`;
        if (sResults) sResults.classList.add('hidden');

        const studentFees = await db.fees.where('student_id').equals(id).toArray();
        const activeFees = studentFees.filter(f => f.is_deleted !== 1);
        activeFees.sort((a, b) => b.payment_date.localeCompare(a.payment_date));

        const lastFee = activeFees[0];
        let lastPaidMonth = "কোন রেকর্ড নেই";
        if (lastFee) {
            lastPaidMonth = lastFee.month;
        }

        const defaultAmount = student.monthly_fee || 500;
        const feeGroupName = student.fee_group_name || "সাধারণ বেতন";

        const quickInfo = document.getElementById('student-quick-info');
        if (quickInfo) {
            quickInfo.innerHTML = `
                <div class="bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 rounded-xl p-4 text-sm space-y-2 text-emerald-950 mb-3 shadow-sm">
                    <div class="flex justify-between font-bold border-b pb-1.5 border-emerald-100/50">
                        <span>${student.name}</span>
                        <span class="font-en text-emerald-800">${student.id}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs text-gray-600 pt-0.5">
                        <div>শ্রেণী: <strong class="text-gray-800">${studentClass}</strong></div>
                        <div>রোল নম্বর: <strong class="text-gray-800 font-en">${roll || '-'}</strong></div>
                        <div>গ্রুপ: <strong class="text-gray-800">${student.group || '-'}</strong></div>
                        <div>মোবাইল: <strong class="text-gray-800 font-en">${student.parent_phone || '-'}</strong></div>
                    </div>
                    <div class="flex justify-between text-xs pt-1.5 border-t border-emerald-100/50">
                        <span>সর্বশেষ পরিশোধিত: <strong class="text-red-600">${lastPaidMonth}</strong></span>
                        <span>ফি গ্রুপ: <strong class="text-emerald-700">${feeGroupName} (৳${defaultAmount})</strong></span>
                    </div>
                </div>`;
            quickInfo.classList.remove('hidden');
        }

        const amountInput = document.getElementById('fee-amount');
        if (amountInput) amountInput.value = defaultAmount;
        suggestNextMonth(lastPaidMonth);
        window.calculateTotal();
    };

    function suggestNextMonth(lastPaidMonth) {
        const bnMonths = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
        let nextIndex = 0;
        if (lastPaidMonth && bnMonths.includes(lastPaidMonth)) {
            const index = bnMonths.indexOf(lastPaidMonth);
            nextIndex = (index + 1) % 12;
        } else {
            nextIndex = new Date().getMonth();
        }
        const monthSelect = document.getElementById('fee-month');
        if (monthSelect) monthSelect.value = bnMonths[nextIndex];
    }

    window.calculateTotal = function() {
        const amount = parseFloat(document.getElementById('fee-amount').value) || 0;
        const fine = parseFloat(document.getElementById('fee-fine').value) || 0;
        const discount = parseFloat(document.getElementById('fee-discount').value) || 0;
        const total = amount + fine - discount;
        
        const totalEl = document.getElementById('fee-total');
        if (totalEl) totalEl.textContent = total.toLocaleString('bn-BD');
    };

    window.filterFees = function() {
        const searchQuery = document.getElementById('search-fee').value.toLowerCase().trim();
        const monthQuery = document.getElementById('filter-fee-month').value;
        window.renderFeesList(searchQuery, monthQuery);
    };

    // ৪. বেতন আদায়ের তালিকা রেন্ডারার
    window.renderFeesList = async function(searchQuery = '', monthQuery = '') {
        const tableBody = document.getElementById('fees-table-body');
        if (!tableBody) return;

        try {
            let fees = await db.fees.reverse().toArray();
            fees = fees.filter(fee => fee.is_deleted !== 1);

            if (searchQuery) {
                fees = fees.filter(fee =>
                    (fee.receipt_id || '').toLowerCase().includes(searchQuery) ||
                    (fee.student_name || '').toLowerCase().includes(searchQuery)
                );
            }

            if (monthQuery) {
                fees = fees.filter(fee => fee.month === monthQuery);
            }

            if (fees.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-4 py-8 text-center text-xs text-gray-500 font-medium">
                            কোনো বেতন আদায়ের তথ্য পাওয়া যায়নি।
                        </td>
                    </tr>`;
                return;
            }

            let htmlContent = '';
            fees.forEach(fee => {
                const syncStatusBadge = fee.is_synced === 1
                    ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-800">
                         <i class="fa-solid fa-cloud-arrow-up"></i> সিঙ্কড
                       </span>`
                    : `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-100 text-amber-800 animate-pulse">
                         <i class="fa-solid fa-clock"></i> পেন্ডিং
                       </span>`;

                const showFineDiscount = (fee.fine > 0 || fee.discount > 0)
                    ? `<div class="text-[9px] text-gray-400 font-en">বেতন: ${fee.amount} ${fee.fine ? `+ জ: ${fee.fine}` : ''} ${fee.discount ? `- ছা: ${fee.discount}` : ''}</div>`
                    : '';

                let methodBadge = '';
                const method = fee.method || 'ক্যাশ';
                if (method === 'বিকাশ') {
                    methodBadge = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-pink-100 text-pink-800 border border-pink-200">বিকাশ</span>`;
                } else if (method === 'নগদ') {
                    methodBadge = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-orange-100 text-orange-800 border border-orange-200">নগদ</span>`;
                } else if (method === 'রকেট') {
                    methodBadge = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-purple-100 text-purple-800 border border-purple-200">রকেট</span>`;
                } else if (method === 'ব্যাংক') {
                    methodBadge = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-blue-100 text-blue-800 border border-blue-200">ব্যাংক</span>`;
                } else {
                    methodBadge = `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-800 border border-emerald-200">ক্যাশ</span>`;
                }

                htmlContent += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="px-4 py-3 text-xs font-bold font-en text-gray-700">
                            <div>${fee.receipt_id}</div>
                            <div class="text-[9px] font-normal text-gray-400">${fee.payment_date}</div>
                        </td>
                        <td class="px-4 py-3 text-xs">
                            <div class="font-bold text-gray-800 text-sm">${fee.student_name}</div>
                            <div class="text-[10px] text-gray-400 font-bold font-en">রোল: ${fee.student_roll || '-'} | ${fee.student_class || 'অজানা'}</div>
                        </td>
                        <td class="px-4 py-3 text-xs text-gray-600 font-semibold">${fee.month}</td>
                        <td class="px-4 py-3 text-xs text-gray-500">
                            <div class="flex items-center gap-1">${methodBadge}</div>
                            ${fee.note ? `<div class="text-[10px] italic text-emerald-600 text-ellipsis overflow-hidden mt-1">নোট: ${fee.note}</div>` : ''}
                        </td>
                        <td class="px-4 py-3 text-xs text-emerald-850 font-bold font-en">
                            <div>৳ ${fee.total || fee.amount}</div>
                            ${showFineDiscount}
                        </td>
                        <td class="px-4 py-3 text-xs">${syncStatusBadge}</td>
                        <td class="px-4 py-3 text-xs">
                            <div class="flex gap-1.5">
                                <button onclick="window.showReceiptModalFromList('${fee.receipt_id}')" class="text-emerald-600 hover:text-emerald-800 p-1.5 rounded hover:bg-emerald-50 transition" title="রসিদ প্রিন্ট">
                                    <i class="fa-solid fa-print"></i>
                                </button>
                                <button onclick="window.editFee('${fee.receipt_id}')" class="text-blue-600 hover:text-blue-800 p-1.5 rounded hover:bg-blue-50 transition" title="সংশোধন">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button onclick="window.deleteFee('${fee.receipt_id}')" class="text-red-600 hover:text-red-800 p-1.5 rounded hover:bg-red-50 transition" title="মুছে ফেলুন">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });

            tableBody.innerHTML = htmlContent;

        } catch (err) {
            console.error("ফি আদায়ের তালিকা রেন্ডার করতে সমস্যা হয়েছে:", err);
        }
    };

    window.editFee = async function(receiptId) {
        try {
            const fee = await db.fees.get(receiptId);
            if (!fee) return;

            document.getElementById('editing-receipt-id').value = fee.receipt_id;
            document.getElementById('fee-student-id').value = fee.student_id;
            document.getElementById('student-search-input').value = `${fee.student_name} (${fee.student_class} - রোল: ${fee.student_roll || '-'})`;
            document.getElementById('fee-amount').value = fee.amount;
            document.getElementById('fee-fine').value = fee.fine || 0;
            document.getElementById('fee-discount').value = fee.discount || 0;
            document.getElementById('fee-month').value = fee.month;
            document.getElementById('fee-method').value = fee.method || 'ক্যাশ';
            document.getElementById('fee-date').value = fee.payment_date;
            document.getElementById('fee-note').value = fee.note || '';

            window.calculateTotal();

            const title = document.getElementById('fee-form-title');
            if (title) title.innerHTML = `<i class="fa-solid fa-pen-to-square text-blue-600"></i> ফি আদায় সংশোধন`;
            
            const submitBtn = document.getElementById('fee-submit-btn');
            if (submitBtn) {
                submitBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition duration-200 flex items-center justify-center gap-2 text-sm";
                submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> সংশোধন সম্পন্ন করুন`;
            }

            const cancelBtn = document.getElementById('cancel-fee-edit-btn');
            if (cancelBtn) cancelBtn.classList.remove('hidden');
            
            const quickInfo = document.getElementById('student-quick-info');
            if (quickInfo) quickInfo.classList.add('hidden');

        } catch (err) {
            console.error("সংশোধন মোডে রূপান্তর করতে সমস্যা:", err);
        }
    };

    window.cancelFeeEdit = function() {
        const form = document.getElementById('fees-form');
        if (form) form.reset();
        
        document.getElementById('editing-receipt-id').value = "";
        document.getElementById('fee-student-id').value = "";
        
        const quickInfo = document.getElementById('student-quick-info');
        if (quickInfo) quickInfo.classList.add('hidden');
        
        document.getElementById('fee-total').textContent = "0";

        const dateInput = document.getElementById('fee-date');
        if (dateInput) {
            dateInput.value = new Date().toISOString().split('T')[0];
        }

        const title = document.getElementById('fee-form-title');
        if (title) title.innerHTML = `<i class="fa-solid fa-money-bill-wave text-emerald-600"></i> নতুন বেতন কালেকশন`;
        
        const submitBtn = document.getElementById('fee-submit-btn');
        if (submitBtn) {
            submitBtn.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition duration-200 flex items-center justify-center gap-2 text-sm shadow-md shadow-emerald-700/10";
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> পেমেন্ট নিশ্চিত করুন`;
        }

        const cancelBtn = document.getElementById('cancel-fee-edit-btn');
        if (cancelBtn) cancelBtn.classList.add('hidden');
    };

    window.deleteFee = async function(receiptId) {
        if (!confirm("আপনি কি নিশ্চিতভাবে এই রসিদ বা ফি আদায়ের তথ্যটি মুছে ফেলতে চান?")) return;

        try {
            await db.fees.update(receiptId, {
                is_deleted: 1,
                is_synced: 0
            });
            showToast("ফি আদায়ের তথ্যটি সফলভাবে মুছে ফেলা হয়েছে।", "success");

            if (document.getElementById('editing-receipt-id').value === receiptId) {
                window.cancelFeeEdit();
            }

            await window.renderFeesList();

            if (typeof updatePendingCount === 'function') {
                await updatePendingCount();
            }

            if (navigator.onLine && typeof triggerAutoSync === 'function') {
                triggerAutoSync();
            }

        } catch (err) {
            console.error("মুছে ফেলার সময় সমস্যা হয়েছে:", err);
            showToast("তথ্যটি মুছে ফেলা সম্ভব হয়নি।", "error");
        }
    };

    // ৫. থার্মাল স্লিপ মেকানিজম উইন্ডো এক্সপোজ (৮০মিমি/৫৮মিমি পারফেক্ট রেন্ডারিং)
    window.showReceiptModal = async function(receiptId) {
        const fee = await db.fees.get(receiptId);
        if (!fee) return;

        activePrintedFee = fee; 

        const madrasahName = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';
        const madrasahAddress = localStorage.getItem('madrasah_address') || 'ঢাকা, বাংলাদেশ';
        const madrasahPhone = localStorage.getItem('madrasah_phone') || '';

        const receiptArea = document.getElementById('receipt-print-area');
        if (!receiptArea) return;
        
        receiptArea.innerHTML = `
            <div class="text-center font-bold text-xs border-b pb-2 mb-2">
                <div class="text-emerald-800 text-sm mb-0.5">${madrasahName}</div>
                <div class="text-gray-500 text-[9px] font-normal">${madrasahAddress}</div>
                ${madrasahPhone ? `<div class="text-gray-500 text-[9px] font-normal font-en">হেল্পলাইন: ${madrasahPhone}</div>` : ''}
            </div>
            
            <div class="space-y-1 font-en text-[9px] border-b pb-2 mb-2">
                <div class="flex justify-between"><span>Receipt ID:</span><span class="font-bold">${fee.receipt_id}</span></div>
                <div class="flex justify-between"><span>Date:</span><span>${fee.payment_date}</span></div>
                <div class="flex justify-between"><span>Month:</span><span>${fee.month}</span></div>
            </div>

            <div class="space-y-1 text-[11px] mb-2">
                <div>ছাত্রের নাম: <strong class="text-emerald-950">${fee.student_name}</strong></div>
                <div class="flex justify-between text-[10px] text-gray-500">
                    <span>শ্রেণী: ${fee.student_class || 'অজানা'}</span>
                    <span>রোল: ${fee.student_roll || '-'}</span>
                </div>
            </div>

            <table class="w-full text-left text-[10px] border-t border-b border-dashed py-1 my-1.5 font-en">
                <thead>
                    <tr class="font-bold">
                        <th class="py-1">Description</th>
                        <th class="py-1 text-right">Amount</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-dashed">
                    <tr><td class="py-1">Monthly Fee</td><td class="py-1 text-right">৳ ${fee.amount}</td></tr>
                    ${fee.fine ? `<tr><td class="py-1">Fine (+)</td><td class="py-1 text-right">+ ৳ ${fee.fine}</td></tr>` : ''}
                    ${fee.discount ? `<tr><td class="py-1">Discount (-)</td><td class="py-1 text-right">- ৳ ${fee.discount}</td></tr>` : ''}
                </tbody>
            </table>

            <div class="flex justify-between font-bold text-xs text-emerald-800 pt-1 border-t font-en">
                <span>Total Paid (${fee.method || 'ক্যাশ'}):</span>
                <span>৳ ${fee.total || fee.amount}</span>
            </div>

            ${fee.note ? `<div class="text-[9px] italic text-gray-500 mt-1">মন্তব্য: ${fee.note}</div>` : ''}

            <div class="text-center font-bold text-[9px] text-emerald-700 pt-3 border-t border-dashed mt-3">
                জাজাকুমুল্লাহু খাইরান!<br>${madrasahName}-এর সাথেই থাকুন।
            </div>
        `;

        const modal = document.getElementById('receipt-modal');
        if (modal) modal.classList.remove('hidden');
    };

    window.showReceiptModalFromList = function(receiptId) {
        window.showReceiptModal(receiptId);
    };

    window.closeReceiptModal = function() {
        const modal = document.getElementById('receipt-modal');
        if (modal) modal.classList.add('hidden');
        activePrintedFee = null;
    };

    // ৬. হোয়াটসঅ্যাপ ডিজিটাল রসিদ মেসেজ ফরম্যাটার
    window.sendFeeReceiptToWhatsApp = function() {
        if (!activePrintedFee) return;

        const phoneNum = activePrintedFee.parent_phone || "";
        const refinedPhone = refinePhoneNumber(phoneNum); 

        let waNumber = refinedPhone;
        if (refinedPhone.startsWith('0')) {
            waNumber = '88' + refinedPhone; 
        }

        const madrasahName = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';

        const wpMessage = `আসসালামু আলাইকুম।
আপনার সন্তান ${activePrintedFee.student_name}-এর ${activePrintedFee.month} মাসের বেতন বাবদ সর্বমোট ৳${activePrintedFee.total || activePrintedFee.amount} ${activePrintedFee.method}-এর মাধ্যমে সফলভাবে গৃহীত হয়েছে।

রসিদ নং: ${activePrintedFee.receipt_id}
ধন্যবাদ।
${madrasahName}`;

        const wpUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(wpMessage)}`;
        window.open(wpUrl, '_blank');
    };
})();
</script>
