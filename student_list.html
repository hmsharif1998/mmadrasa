
<style>
    /* প্রিন্ট মোডে সাইডবার, হেডার এবং কন্ট্রোল প্যানেল লুকিয়ে ফেলার সিএসএস */
    @media print {
        #sidebar, header, .no-print, #student-list-table-body td:last-child, th:last-child {
            display: none !important;
        }
        main {
            padding: 0 !important;
            margin: 0 !important;
            background: white !important;
        }
        body {
            background: white !important;
            font-size: 11px !important;
        }
        /* প্রিন্ট হেডার */
        #print-header {
            display: block !important;
        }
    }
</style>

<!-- প্রিন্ট করার সময় রিপোর্টের শিরোনাম দেখানোর জন্য হেডার (এমনিতে লুকানো থাকবে) -->
<div id="print-header" class="hidden text-center border-b pb-4 mb-5">
    <h2 id="print-madrasah-name" class="text-xl font-bold text-emerald-800">মাদরাসাতুল মদিনা</h2>
    <p id="print-madrasah-address" class="text-xs text-gray-500">ঢাকা, বাংলাদেশ</p>
    <h3 class="text-sm font-bold mt-2 text-gray-700">ফিল্টারকৃত শিক্ষার্থীদের রিপোর্ট তালিকা (<span id="print-report-month"></span>)</h3>
</div>

<div class="space-y-6">

    <!-- পরিসংখ্যান ও প্রগ্রেসবার প্যানেল -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 no-print">
        <!-- ফিল্টারকৃত মোট ছাত্র -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">ফিল্টারকৃত মোট ছাত্র</p>
                <h4 class="text-2xl font-bold text-gray-800 mt-1 font-en" id="stat-total">0</h4>
            </div>
            <div class="bg-blue-50 text-blue-600 p-3 rounded-full">
                <i class="fa-solid fa-graduation-cap text-lg"></i>
            </div>
        </div>
        <!-- বেতন পরিশোধিত -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">বেতন পরিশোধ করেছে</p>
                <h4 class="text-2xl font-bold text-emerald-600 mt-1 font-en" id="stat-paid">0</h4>
            </div>
            <div class="bg-emerald-50 text-emerald-600 p-3 rounded-full">
                <i class="fa-solid fa-circle-check text-lg"></i>
            </div>
        </div>
        <!-- বকেয়া আছে -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">বেতন বকেয়া আছে</p>
                <h4 class="text-2xl font-bold text-red-600 mt-1 font-en" id="stat-due">0</h4>
            </div>
            <div class="bg-red-50 text-red-600 p-3 rounded-full">
                <i class="fa-solid fa-circle-xmark text-lg"></i>
            </div>
        </div>
        <!-- আদায় হার এবং প্রগ্রেসবার -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">আদায়ের হার (চলতি মাসে)</p>
                <span id="stat-ratio" class="text-xs font-bold text-emerald-700 font-en">0%</span>
            </div>
            <!-- প্রোগ্রেস বার -->
            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                <div id="stat-progress-bar" class="bg-emerald-600 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- ফিল্টারিং ও সার্চ কন্টেইনার -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 no-print">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-filter text-emerald-600"></i> ফিল্টারিং ও সার্চ অপশন
            </h3>
            <!-- প্রিন্ট রিপোর্ট বাটন -->
            <button onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1.5 shadow-sm">
                <i class="fa-solid fa-print"></i> অফিশিয়াল তালিকা প্রিন্ট করুন
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <!-- নাম, আইডি বা মোবাইল সার্চ -->
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">ছাত্র খুঁজুন</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input type="text" id="search-student-list" oninput="renderFilteredStudents()" placeholder="নাম, রোল, আইডি বা মোবাইল..."
                           class="w-full pl-9 pr-3 py-2 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs">
                </div>
            </div>

            <!-- শ্রেণী ফিল্টার -->
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">শ্রেণী</label>
                <select id="filter-class-list" onchange="renderFilteredStudents()"
                        class="w-full px-3 py-2 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs bg-white text-gray-700 font-semibold">
                    <option value="">সকল শ্রেণী</option>
                    <option value="হিফজ">হিফজ</option>
                    <option value="নাজেরা">নাজেরা</option>
                    <option value="নূরানী">নূরানী</option>
                    <option value="প্রথম শ্রেণী">প্রথম শ্রেণী</option>
                    <option value="দ্বিতীয় শ্রেণী">দ্বিতীয় শ্রেণী</option>
                </select>
            </div>

            <!-- বেতন মাস ফিল্টার -->
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">বেতনের মাস</label>
                <select id="filter-month" onchange="renderFilteredStudents()"
                        class="w-full px-3 py-2 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs bg-white text-gray-700 font-semibold">
                    <option value="জানুয়ারি">জানুয়ারি</option>
                    <option value="ফেব্রুয়ারি">ফেব্রুয়ারি</option>
                    <option value="মার্চ">মার্চ</option>
                    <option value="এপ্রিল">এপ্রিল</option>
                    <option value="মে">মে</option>
                    <option value="জুন">জুন</option>
                    <option value="জুলাই">জুলাই</option>
                    <option value="আগস্ট">আগস্ট</option>
                    <option value="সেপ্টেম্বর">সেপ্টেম্বর</option>
                    <option value="অক্টোবর">অক্টোবর</option>
                    <option value="নভেম্বর">নভেম্বর</option>
                    <option value="ডিসেম্বর">ডিসেম্বর</option>
                </select>
            </div>

            <!-- বেতন স্ট্যাটাস ফিল্টার -->
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-1">বেতন স্ট্যাটাস</label>
                <select id="filter-status-list" onchange="renderFilteredStudents()"
                        class="w-full px-3 py-2 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs bg-white text-gray-700 font-semibold">
                    <option value="all">সবাই</option>
                    <option value="paid">পরিশোধিত</option>
                    <option value="due">বকেয়া</option>
                </select>
            </div>
        </div>
    </div>

    <!-- ছাত্রদের ডাটা টেবিল কন্টেইনার -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
        <div class="overflow-x-auto rounded-xl border border-gray-100">
            <table class="min-w-full divide-y divide-gray-100">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">রোল ও আইডি</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">নাম ও অভিভাবক</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">শ্রেণী ও আবাসন</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">যোগাযোগ</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider">বেতন স্ট্যাটাস</th>
                    <th class="px-4 py-3 text-left text-[11px] font-bold text-gray-400 uppercase tracking-wider no-print">অ্যাকশন</th>
                </tr>
                </thead>
                <tbody id="student-list-table-body" class="bg-white divide-y divide-gray-100">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- মডাল ১: শিক্ষার্থীর বিস্তারিত প্রোফাইল মডাল (Popup Biodata) -->
<div id="profile-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden no-print">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 shadow-2xl relative border border-gray-100 animate-fadeIn">
        <h4 class="text-sm font-bold text-emerald-800 border-b pb-3 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-address-card"></i> শিক্ষার্থীর বিস্তারিত বায়োডাটা
        </h4>
        <div id="profile-modal-body" class="space-y-3.5 text-xs text-gray-700 leading-relaxed">
            <!-- ডাইনামিক প্রোফাইল ডাটা স্ক্রিপ্ট দিয়ে লোড হবে -->
        </div>
        <div class="mt-6 flex justify-end">
            <button onclick="closeProfileModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-4 py-2 rounded-xl text-xs transition">
                বন্ধ করুন
            </button>
        </div>
    </div>
</div>

<script>
    async function initStudentlist() {
        const name = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';
        const address = localStorage.getItem('madrasah_address') || 'ঢাকা, বাংলাদেশ';
        document.getElementById('print-madrasah-name').textContent = name;
        document.getElementById('print-madrasah-address').textContent = address;

        const bnMonths = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
        const currentMonthName = bnMonths[new Date().getMonth()];
        const monthSelect = document.getElementById('filter-month');
        if (monthSelect) {
            monthSelect.value = currentMonthName;
        }

        await renderFilteredStudents();
    }

    async function renderFilteredStudents() {
        const tableBody = document.getElementById('student-list-table-body');
        if (!tableBody) return;

        const searchQuery = document.getElementById('search-student-list').value.toLowerCase().trim();
        const classQuery = document.getElementById('filter-class-list').value;
        const monthQuery = document.getElementById('filter-month').value;
        const statusQuery = document.getElementById('filter-status-list').value;

        document.getElementById('print-report-month').textContent = monthQuery;

        try {
            let students = await db.students.toArray();
            students = students.filter(student => student.is_deleted !== 1);

            let fees = await db.fees.toArray();
            const activeFees = fees.filter(fee => fee.is_deleted !== 1);

            const paidMap = {};
            activeFees.forEach(fee => {
                if (fee.month === monthQuery) {
                    paidMap[fee.student_id] = fee;
                }
            });

            let filtered = students;

            if (searchQuery) {
                filtered = filtered.filter(s =>
                    s.name.toLowerCase().includes(searchQuery) ||
                    s.id.toLowerCase().includes(searchQuery) ||
                    s.parent_phone.includes(searchQuery) ||
                    (s.father_name && s.father_name.toLowerCase().includes(searchQuery))
                );
            }

            if (classQuery) {
                filtered = filtered.filter(s => s.class === classQuery);
            }

            if (statusQuery === 'paid') {
                filtered = filtered.filter(s => paidMap[s.id] !== undefined);
            } else if (statusQuery === 'due') {
                filtered = filtered.filter(s => paidMap[s.id] === undefined);
            }

            filtered.sort((a, b) => (a.roll || 0) - (b.roll || 0));

            // আদায়ের পরিসংখ্যান গণনা
            let totalPaid = 0;
            let totalDue = 0;
            filtered.forEach(s => {
                if (paidMap[s.id]) totalPaid++;
                else totalDue++;
            });

            const collectionRate = filtered.length > 0 ? Math.round((totalPaid / filtered.length) * 100) : 0;

            document.getElementById('stat-total').textContent = filtered.length;
            document.getElementById('stat-paid').textContent = totalPaid;
            document.getElementById('stat-due').textContent = totalDue;
            document.getElementById('stat-ratio').textContent = collectionRate + "%";
            document.getElementById('stat-progress-bar').style.width = collectionRate + "%";

            if (filtered.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-4 py-8 text-center text-xs text-gray-500 font-medium">
                            কোনো শিক্ষার্থীর তথ্য পাওয়া যায়নি।
                        </td>
                    </tr>`;
                return;
            }

            let html = '';
            filtered.forEach(s => {
                const feeObj = paidMap[s.id];
                let statusCell = '';
                let actionButton = '';

                // ডাইনামিক ফিল্ডগুলোর সেফগার্ড চেক (যাতে কোনো ভ্যালু আনডিফাইনড থাকলেও পেজ ক্র্যাশ না করে)
                const sName = s.name || "অজানা";
                const sRoll = s.roll || "-";
                const sClass = s.class || "-";
                const sResidence = s.residence || "অনাবাসিক";
                const sId = s.id || "";
                const sFather = s.father_name || "-";
                const sPhone = s.parent_phone || "";
                const sWhatsapp = s.whatsapp_no || "";

                if (feeObj) {
                    statusCell = `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-800">
                         <i class="fa-solid fa-circle-check"></i> পরিশোধিত (৳${feeObj.total || feeObj.amount})
                       </span>`;
                    actionButton = `
                        <span class="text-[10px] text-gray-400 font-bold"><i class="fa-solid fa-receipt"></i> ${feeObj.receipt_id}</span>
                    `;
                } else {
                    statusCell = `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold bg-rose-100 text-red-800 animate-pulse">
                         <i class="fa-solid fa-circle-xmark"></i> বকেয়া
                       </span>`;
                    
                    // মোবাইল ও হোয়াটসঅ্যাপ নম্বর সেফগার্ড চেক
                    const wpPhoneVal = sWhatsapp || sPhone || "";
                    const formattedNumber = formatWhatsAppNumber(wpPhoneVal);
                    const wpMessage = `আসসালামু আলাইকুম। ${localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা'} থেকে জানানো যাচ্ছে যে, আপনার সন্তান ${sName} (শ্রেণী: ${sClass}, রোল: ${sRoll})-এর ${monthQuery} মাসের বেতন এখনো বকেয়া রয়েছে। অনুগ্রহ করে দ্রুত পরিশোধ করুন। ধন্যবাদ।`;
                    const wpUrl = `https://wa.me/${formattedNumber}?text=${encodeURIComponent(wpMessage)}`;

                    actionButton = `
                        <div class="flex gap-1">
                            <button onclick="collectFeeFor('${sId}')" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold px-2 py-1 rounded-lg border border-red-150 transition flex items-center gap-1 text-[10px]" title="বেতন নিন">
                                <i class="fa-solid fa-wallet"></i> বেতন
                            </button>
                            <a href="${wpUrl}" target="_blank" class="bg-green-50 hover:bg-green-100 text-green-600 font-bold px-2 py-1 rounded-lg border border-green-150 transition flex items-center justify-center text-[10px]" title="হোয়াটসঅ্যাপ রিমাইন্ডার">
                                <i class="fa-brands fa-whatsapp text-xs"></i> বকেয়া
                            </a>
                        </div>
                    `;
                }

                html += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="px-4 py-3 text-xs">
                            <div class="font-bold text-gray-700 font-en">রোল: ${sRoll}</div>
                            <div class="text-[10px] text-gray-400 font-bold font-en">${sId}</div>
                        </td>
                        <td class="px-4 py-3 text-xs">
                            <button onclick="showStudentProfile('${sId}')" class="font-bold text-emerald-800 hover:underline text-left text-sm cursor-pointer">${sName}</button>
                            <div class="text-[11px] text-gray-500">পিতা: ${sFather}</div>
                        </td>
                        <td class="px-4 py-3 text-xs text-gray-700 font-bold">
                            <div class="text-emerald-950">${sClass}</div>
                            <div class="text-[10px] text-gray-400 font-normal">${sResidence}</div>
                        </td>
                        <td class="px-4 py-3 text-[11px] text-gray-600 font-en">
                            <div><i class="fa-solid fa-phone text-emerald-600"></i> ${sPhone}</div>
                            ${sWhatsapp ? `<div><i class="fa-brands fa-whatsapp text-green-500"></i> ${sWhatsapp}</div>` : ''}
                        </td>
                        <td class="px-4 py-3 text-xs">${statusCell}</td>
                        <td class="px-4 py-3 text-xs no-print">${actionButton}</td>
                    </tr>`;
            });

            tableBody.innerHTML = html;

        } catch (err) {
            console.error("তালিকা প্রস্তুত করতে ত্রুটি:", err);
        }
    }

    // মোবাইল নম্বর বাংলাদেশের ফরম্যাটে ডাইনামিক রূপান্তর করার সেফগার্ড ফাংশন
    function formatWhatsAppNumber(phone) {
        if (!phone) return "";
        let clean = phone.toString().replace(/\D/g, ''); // সংখ্যা বা টেক্সট যা-ই হোক, স্ট্রিং কনভার্ট করে নিরাপদ রিপ্লেস করা
        if (clean.startsWith('0')) {
            clean = '88' + clean;
        }
        return clean;
    }

    async function showStudentProfile(studentId) {
        try {
            const s = await db.students.get(studentId);
            if (!s) return;

            const modalBody = document.getElementById('profile-modal-body');
            modalBody.innerHTML = `
                <div class="flex items-center gap-4 border-b pb-3 mb-3">
                    <div class="bg-emerald-50 text-emerald-700 p-4 rounded-full">
                        <i class="fa-solid fa-user-graduate text-3xl"></i>
                    </div>
                    <div>
                        <h5 class="text-sm font-extrabold text-gray-800">${s.name || "অজানা"}</h5>
                        <p class="text-[10px] text-gray-400 font-bold tracking-wider font-en">ID: ${s.id || ""}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-x-4 gap-y-2 border-b pb-3">
                    <div><span class="text-gray-400 font-semibold block text-[10px]">পিতার নাম:</span> <strong>${s.father_name || '-'}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">মাতার নাম:</span> <strong>${s.mother_name || '-'}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">জন্ম তারিখ:</span> <strong class="font-en">${s.dob || '-'}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">রক্তের গ্রুপ:</span> <strong class="text-rose-600">${s.blood_group || '-'}</strong></div>
                </div>

                <div class="grid grid-cols-2 gap-x-4 gap-y-2 border-b pb-3">
                    <div><span class="text-gray-400 font-semibold block text-[10px]">শ্রেণী:</span> <strong>${s.class || "-"}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">রোল নম্বর:</span> <strong class="font-en">${s.roll || "-"}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">আবাসন স্ট্যাটাস:</span> <strong>${s.residence || 'অনাবাসিক'}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">ভর্তির তারিখ:</span> <strong class="font-en">${s.admission_date || '-'}</strong></div>
                </div>

                <div class="space-y-1">
                    <div><span class="text-gray-400 font-semibold block text-[10px]">জন্ম নিবন্ধন নম্বর:</span> <strong class="font-en">${s.birth_reg || '-'}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">মোবাইল নম্বর:</span> <strong class="font-en">${s.parent_phone || ""}</strong></div>
                    <div><span class="text-gray-400 font-semibold block text-[10px]">বর্তমান ঠিকানা:</span> <strong>${s.address || '-'}</strong></div>
                </div>
            `;

            document.getElementById('profile-modal').classList.remove('hidden');

        } catch (err) {
            console.error("প্রোফাইল লোড করতে समस्या:", err);
            showToast("প্রোফাইল ডাটা লোড করা সম্ভব হয়নি।", "error");
        }
    }

    function closeProfileModal() {
        document.getElementById('profile-modal').classList.add('hidden');
    }

    window.collectFeeFor = function(studentId) {
        window.preselectedStudentId = studentId;
        loadModule('fees');
    }
</script>
