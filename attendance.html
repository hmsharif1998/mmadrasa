<style>
    @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

    #attendance-container {
        font-family: 'Hind Siliguri', 'Inter', sans-serif;
    }
    .font-en {
        font-family: 'Inter', sans-serif;
    }
    .custom-scroll::-webkit-scrollbar {
        width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #f1f5f9;
        border-radius: 4px;
    }
</style>

<div id="attendance-container" class="space-y-6">

    <!-- ১. হাজিরার রিয়্যাল-টাইম পরিসংখ্যান কার্ডসমূহ -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-gradient-to-br from-emerald-50 to-emerald-100/50 p-5 rounded-2xl shadow-sm border border-emerald-100 flex items-center justify-between">
            <div>
                <p class="text-xs text-emerald-800 font-bold uppercase tracking-wider">আজকের মোট উপস্থিত</p>
                <h4 class="text-3xl font-extrabold text-emerald-950 mt-1 font-en" id="stat-present">0</h4>
            </div>
            <div class="bg-emerald-600 text-white p-3.5 rounded-full shadow-md shadow-emerald-500/10">
                <i class="fa-solid fa-circle-check text-xl"></i>
            </div>
        </div>

        <div class="bg-gradient-to-br from-rose-50 to-rose-100/50 p-5 rounded-2xl shadow-sm border border-rose-100 flex items-center justify-between">
            <div>
                <p class="text-xs text-rose-800 font-bold uppercase tracking-wider">আজকের অনুপস্থিত</p>
                <h4 class="text-3xl font-extrabold text-rose-950 mt-1 font-en" id="stat-absent">0</h4>
            </div>
            <div class="bg-rose-600 text-white p-3.5 rounded-full shadow-md shadow-rose-500/10">
                <i class="fa-solid fa-circle-xmark text-xl"></i>
            </div>
        </div>

        <div class="bg-gradient-to-br from-amber-50 to-amber-100/50 p-5 rounded-2xl shadow-sm border border-amber-100 flex items-center justify-between">
            <div>
                <p class="text-xs text-amber-800 font-bold uppercase tracking-wider">আজকের বিলম্ব (Late)</p>
                <h4 class="text-3xl font-extrabold text-amber-950 mt-1 font-en" id="stat-late">0</h4>
            </div>
            <div class="bg-amber-500 text-white p-3.5 rounded-full shadow-md shadow-amber-500/10">
                <i class="fa-solid fa-clock text-xl"></i>
            </div>
        </div>

        <!-- গড় উপস্থিতির হার -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-150 flex flex-col justify-center">
            <div class="flex justify-between items-center mb-2">
                <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">উপস্থিতির গড় হার</p>
                <span id="stat-ratio" class="text-sm font-extrabold text-emerald-700 font-en">0%</span>
            </div>
            <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                <div id="stat-progress-bar" class="bg-emerald-600 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- ২. ফিল্টারিং প্যানেল -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <h3 class="text-base font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-filter text-emerald-600 text-lg"></i> শাখা ও শ্রেণী ফিল্টার করুন
            </h3>
            <button type="button" onclick="window.markAllAsPresent()" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold px-4 py-2.5 rounded-xl text-xs transition flex items-center gap-1.5 border border-emerald-200">
                <i class="fa-solid fa-check-double"></i> সবাইকে উপস্থিত করুন
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">হাজিরার তারিখ *</label>
                <input type="date" id="attendance-date" onchange="window.onDateOrFilterChange()"
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs font-bold font-en">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">শাখা (Branch) *</label>
                <select id="attendance-branch-filter" onchange="window.onDateOrFilterChange()"
                        class="w-full px-3 py-2.5 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs bg-white text-gray-700 font-bold">
                    <option value="">শাখা নির্বাচন করুন</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">শ্রেণী/জামাত *</label>
                <select id="attendance-class-filter" onchange="window.onDateOrFilterChange()"
                        class="w-full px-3 py-2.5 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs bg-white text-gray-700 font-bold">
                    <option value="">শ্রেণী নির্বাচন করুন</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">গ্রুপ/সেকশন</label>
                <select id="attendance-group-filter" onchange="window.onDateOrFilterChange()"
                        class="w-full px-3 py-2.5 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 focus:outline-none text-xs bg-white text-gray-700 font-bold">
                    <option value="">সকল গ্রুপ</option>
                </select>
            </div>
        </div>
    </div>

    <!-- ৩. হাজিরা দেওয়ার মূল টেবিল এলাকা -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
        <div class="overflow-x-auto rounded-xl border border-gray-150 max-h-[500px] overflow-y-auto custom-scroll">
            <table class="min-w-full divide-y divide-gray-100">
                <thead class="bg-gray-50 sticky top-0 z-10">
                <tr>
                    <th class="px-4 py-3 text-left font-bold text-gray-400 uppercase tracking-wider">রোল ও আইডি</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-400 uppercase tracking-wider">শিক্ষার্থীর পরিচিতি</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-400 uppercase tracking-wider">হাজিরা হিস্ট্রি (আজীবন)</th>
                    <th class="px-4 py-3 text-center font-bold text-gray-400 uppercase tracking-wider w-64">হাজিরা স্ট্যাটাস</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-400 uppercase tracking-wider w-48">হাজিরা মন্তব্য/নোট</th>
                    <th class="px-4 py-3 text-right font-bold text-gray-400 uppercase tracking-wider">অ্যাকশন</th>
                </tr>
                </thead>
                <tbody id="attendance-table-body" class="bg-white divide-y divide-gray-100 text-xs">
                    <tr>
                        <td colspan="6" class="px-4 py-12 text-center text-gray-400 font-bold">অনুগ্রহ করে উপর থেকে শাখা ও শ্রেণী সিলেক্ট করুন</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
(function() {
    let academicStructure = [];
    let studentsInClass = []; 
    let attendanceMap = {};    
    
    // ১০ সেকেন্ড ডিবান্সড সিঙ্ক টাইমার ট্র্যাকিং ভ্যারিয়েবল
    let syncTimeout = null; 

    // ১. গ্লোবাল উইন্ডো অবজেক্টে প্রধান ইনিশিয়ালাইজার বাইন্ডিং (লকিং বাগ সম্পূর্ণ দূর করা হয়েছে)
    window.initAttendance = async function() {
        // টাইমজোন-সেফ লোকাল ডেট জেনারেটর
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        document.getElementById('attendance-date').value = `${year}-${month}-${day}`;

        // settings টেবিল থেকে কনফিগারেশন ব্লক লোড
        const config = await db.settings.get('madrasah_config_block') || {};
        academicStructure = config.academic_structure ? JSON.parse(config.academic_structure) : [];
        window.populateAttendanceFilters();

        await window.onDateOrFilterChange();
    };

    window.populateAttendanceFilters = function() {
        const branchSelect = document.getElementById('attendance-branch-filter');
        const classSelect = document.getElementById('attendance-class-filter');
        const groupSelect = document.getElementById('attendance-group-filter');
        if (!branchSelect || !classSelect || !groupSelect) return;

        branchSelect.innerHTML = `<option value="">শাখা নির্বাচন করুন</option>`;
        classSelect.innerHTML = `<option value="">শ্রেণী নির্বাচন করুন</option>`;
        groupSelect.innerHTML = `<option value="">সকল গ্রুপ</option>`;

        const classesSet = new Set();
        const groupsSet = new Set();

        academicStructure.forEach(branch => {
            branchSelect.innerHTML += `<option value="${branch.name}">${branch.name}</option>`;
            branch.departments.forEach(dept => {
                dept.classes.forEach(cls => {
                    classesSet.add(cls.name);
                    cls.groups.forEach(g => groupsSet.add(g));
                });
            });
        });

        classesSet.forEach(cls => {
            classSelect.innerHTML += `<option value="${cls}">${cls}</option>`;
        });
        groupsSet.forEach(g => {
            groupSelect.innerHTML += `<option value="${g}">${g}</option>`;
        });
    };

    // ২. ফিল্টার বা ডেট চেঞ্জ হলে শিক্ষার্থীর ডাটা ও রিয়্যালটাইম নামের তালিকা লোড
    window.onDateOrFilterChange = async function() {
        const date = document.getElementById('attendance-date').value;
        const branch = document.getElementById('attendance-branch-filter').value;
        const className = document.getElementById('attendance-class-filter').value;
        const group = document.getElementById('attendance-group-filter').value;

        const tableBody = document.getElementById('attendance-table-body');
        if (!tableBody) return;

        if (!branch || !className) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="6" class="px-4 py-12 text-center text-gray-400 font-bold">হাজিরা খাতা লোড করতে প্রথমে শাখা ও শ্রেণী সিলেক্ট করুন</td>
                </tr>`;
            resetStats();
            return;
        }

        try {
            // ওই ক্লাসের সব ডিলিট না হওয়া শিক্ষার্থীদের লোড করা
            let students = await db.students.reverse().toArray();
            students = students.filter(s => s.is_deleted !== 1 && s.branch === branch && s.class === className);
            if (group) {
                students = students.filter(s => s.group === group);
            }

            students.sort((a, b) => (a.roll || 0) - (b.roll || 0));
            studentsInClass = students;

            // ডেটের সেভ করা হাজিরা ডাটা লোড
            const savedAttendance = await db.attendance.where('date').equals(date).toArray();
            attendanceMap = {};
            savedAttendance.forEach(att => {
                if (att.is_deleted !== 1) {
                    attendanceMap[att.student_id] = {
                        status: att.status,
                        note: att.note || "",
                        attendance_id: att.attendance_id
                    };
                }
            });

            await window.renderAttendanceTable();

        } catch (err) {
            console.error("হাজিরা ডাটা লোডে সমস্যা:", err);
        }
    };

    // ৩. হাজিরার প্রধান ডাটা টেবিল রেন্ডারার
    window.renderAttendanceTable = async function() {
        const tableBody = document.getElementById('attendance-table-body');
        if (!tableBody) return;

        if (studentsInClass.length === 0) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="6" class="px-4 py-8 text-center text-gray-500 font-medium">এই শাখা ও শ্রেণীতে কোনো শিক্ষার্থীর তথ্য পাওয়া যায়নি।</td>
                </tr>`;
            resetStats();
            return;
        }

        let html = '';
        let presentCount = 0;
        let absentCount = 0;
        let lateCount = 0;

        for (let i = 0; i < studentsInClass.length; i++) {
            const s = studentsInClass[i];
            const att = attendanceMap[s.id] || { status: "", note: "" };

            if (att.status === 'Present') presentCount++;
            else if (att.status === 'Absent') absentCount++;
            else if (att.status === 'Late') lateCount++;

            // আজীবন হাজিরা পরিসংখ্যান হিস্ট্রি
            const history = await getStudentAttendanceStats(s.id);

            html += `
                <tr class="hover:bg-gray-50 border-b border-gray-100 transition">
                    <td class="px-4 py-3 text-xs font-bold font-en text-gray-700">
                        <div>রোল: ${s.roll || '-'}</div>
                        <div class="text-[10px] text-gray-400 font-bold font-en">${s.id}</div>
                    </td>
                    <td class="px-4 py-3 text-xs">
                        <div class="flex items-center gap-2">
                            ${s.photo_url ? `<img class="w-8 h-8 rounded-full object-cover border" src="${s.photo_url}">` : '<div class="w-8 h-8 rounded-full bg-emerald-50 text-emerald-700 flex items-center justify-center font-bold font-en text-[10px]">St</div>'}
                            <div>
                                <div class="font-bold text-gray-800 text-sm">${s.name || 'অজানা'}</div>
                                <div class="text-[9px] text-gray-400 font-bold">Sl: ${s.serial_no || '-'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-[10px] text-gray-500">
                        <div class="flex gap-2">
                            <span class="bg-emerald-50 text-emerald-800 px-1.5 py-0.5 rounded-full font-bold">উপস্থিত: ${history.present} দিন</span>
                            <span class="bg-rose-50 text-rose-800 px-1.5 py-0.5 rounded-full font-bold">অনুপস্থিত: ${history.absent} দিন</span>
                            <span class="bg-amber-50 text-amber-800 px-1.5 py-0.5 rounded-full font-bold">বিলম্ব: ${history.late} day</span>
                        </div>
                        <div class="text-gray-400 font-bold mt-1">উপস্থিতির হার: <strong class="text-emerald-700 font-en font-bold">${history.rate}%</strong></div>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <div class="inline-flex rounded-xl p-1 bg-gray-100 border gap-1">
                            <button type="button" onclick="window.setAttendanceStatus('${s.id}', 'Present')" class="px-3 py-1 rounded-lg text-[10px] font-bold transition-all duration-150 ${att.status === 'Present' ? 'bg-emerald-600 text-white shadow-sm' : 'text-gray-600 hover:bg-white'}">উপস্থিত</button>
                            <button type="button" onclick="window.setAttendanceStatus('${s.id}', 'Absent')" class="px-3 py-1 rounded-lg text-[10px] font-bold transition-all duration-150 ${att.status === 'Absent' ? 'bg-rose-600 text-white shadow-sm' : 'text-gray-600 hover:bg-white'}">অনুপস্থিত</button>
                            <button type="button" onclick="window.setAttendanceStatus('${s.id}', 'Late')" class="px-3 py-1 rounded-lg text-[10px] font-bold transition-all duration-150 ${att.status === 'Late' ? 'bg-amber-500 text-white shadow-sm' : 'text-gray-600 hover:bg-white'}">বিলম্ব</button>
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        <input type="text" value="${att.note}" onchange="window.setAttendanceNote('${s.id}', this.value)" placeholder="যেমন: অসুস্থতা..."
                               class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-[11px] focus:outline-none focus:border-emerald-500 bg-white">
                    </td>
                    <td class="px-4 py-3 text-right">
                        ${att.status === 'Absent' ? `
                            <button type="button" onclick="window.sendAbsentAlertToWhatsApp('${s.id}')" class="bg-green-50 hover:bg-green-100 text-green-600 border border-green-200 font-bold px-2 py-1 rounded-lg text-[10px] flex items-center justify-center gap-1.5 transition ml-auto shadow-sm" title="অনুপস্থিতি নোটিশ পাঠান">
                                <i class="fa-brands fa-whatsapp text-xs"></i> নোটিশ
                            </button>` : '-'}
                    </td>
                </tr>`;
        }

        tableBody.innerHTML = html;
        updateGlobalStats(presentCount, absentCount, lateCount);
    };

    function updateGlobalStats(p, a, l) {
        const presentEl = document.getElementById('stat-present');
        const absentEl = document.getElementById('stat-absent');
        const lateEl = document.getElementById('stat-late');
        const ratioEl = document.getElementById('stat-ratio');
        const barEl = document.getElementById('stat-progress-bar');

        if (presentEl) presentEl.textContent = p;
        if (absentEl) absentEl.textContent = a;
        if (lateEl) lateEl.textContent = l;

        const total = p + a + l;
        const rate = total > 0 ? Math.round((p / total) * 100) : 0;
        if (ratioEl) ratioEl.textContent = rate + "%";
        if (barEl) barEl.style.width = rate + "%";
    }

    function resetStats() {
        updateGlobalStats(0, 0, 0);
    }

    // ৪. ১০ সেকেন্ড ডিবান্সড অটো-সিঙ্ক মেকানিজম (Debounced Sync Logic)
    async function triggerDebouncedSync() {
        if (syncTimeout) {
            clearTimeout(syncTimeout);
        }

        // ১০ সেকেন্ড পর ক্লাউডে সিঙ্ক করার বাফার
        syncTimeout = setTimeout(async () => {
            if (navigator.onLine && typeof triggerAutoSync === 'function') {
                console.log("Debounced Auto-Sync: সিঙ্ক হচ্ছে...");
                await triggerAutoSync();
            }
        }, 10000); 
    }

    window.markAllAsPresent = async function() {
        const date = document.getElementById('attendance-date').value;
        if (studentsInClass.length === 0) {
            showToast("প্রথমে একটি ক্লাসের তালিকা ফিল্টার করুন!", "error");
            return;
        }

        if (!confirm("আপনি কি নিশ্চিতভাবে উপস্থিত না থাকা সকল ছাত্রকে উপস্থিত করতে চান?")) return;

        const bulkData = [];

        for (let s of studentsInClass) {
            const compoundKey = `${s.id}_${date}`;
            const att = attendanceMap[s.id] || { status: "", note: "" };
            
            if (att.status !== 'Present') {
                bulkData.push({
                    attendance_id: compoundKey,
                    student_id: s.id,
                    date: date,
                    status: 'Present',
                    note: att.note || "",
                    is_synced: 0,
                    is_deleted: 0
                });
                attendanceMap[s.id] = { status: 'Present', note: att.note || "", attendance_id: compoundKey };
            }
        }

        if (bulkData.length > 0) {
            try {
                await db.attendance.bulkPut(bulkData);
                showToast("সকল শিক্ষার্থীকে উপস্থিত করা হয়েছে!", "success");
                await window.onDateOrFilterChange();
                triggerDebouncedSync(); 
            } catch (err) {
                console.error("বাল্ক হাজিরার সময় ত্রুটি:", err);
                showToast("হাজিরা সংরক্ষণ করা সম্ভব হয়নি।", "error");
            }
        } else {
            showToast("সবাই ইতিমধ্যে উপস্থিত আছেন।", "info");
        }
    };

    window.setAttendanceStatus = async function(studentId, status) {
        const att = attendanceMap[studentId] || { status: "", note: "" };
        await saveAttendanceToDb(studentId, status, att.note);
        await window.onDateOrFilterChange(); 
    };

    window.setAttendanceNote = async function(studentId, noteVal) {
        const att = attendanceMap[studentId] || { status: "", note: "" };
        await saveAttendanceToDb(studentId, att.status || 'Present', noteVal);
        await window.onDateOrFilterChange();
    };

    async function saveAttendanceToDb(studentId, status, note) {
        const date = document.getElementById('attendance-date').value;
        const compoundKey = `${studentId}_${date}`;

        try {
            await db.attendance.put({
                attendance_id: compoundKey,
                student_id: studentId,
                date: date,
                status: status,
                note: note || "",
                is_synced: 0,
                is_deleted: 0
            });
            attendanceMap[studentId] = { status: status, note: note, attendance_id: compoundKey };
            triggerDebouncedSync(); 

        } catch (err) {
            console.error("হাজিরা রাইট ফেইলড:", err);
            showToast("হাজিরা সেভ করা যায়নি।", "error");
        }
    }

    async function getStudentAttendanceStats(studentId) {
        try {
            const list = await db.attendance.where('student_id').equals(studentId).toArray();
            const activeList = list.filter(a => a.is_deleted !== 1);

            const p = activeList.filter(a => a.status === 'Present').length;
            const a = activeList.filter(a => a.status === 'Absent').length;
            const l = activeList.filter(a => a.status === 'Late').length;

            const total = p + a + l;
            const rate = total > 0 ? Math.round((p / total) * 100) : 100;

            return { present: p, absent: a, late: l, rate: rate };
        } catch (err) {
            return { present: 0, absent: 0, late: 0, rate: 100 };
        }
    }

    function refinePhoneNumber(phone) {
        if (!phone) return "";
        let clean = phone.toString().replace(/\D/g, ''); 
        if (clean.startsWith('8801')) {
            clean = clean.substring(2);
        }
        if (!clean.startsWith('01') && clean.length === 10) {
            clean = '0' + clean;
        }
        return clean; 
    }

    window.sendAbsentAlertToWhatsApp = async function(studentId) {
        const student = studentsInClass.find(s => s.id === studentId);
        if (!student) return;

        const rawPhone = student.parent_phone;
        const refinedPhone = refinePhoneNumber(rawPhone);

        let waNumber = refinedPhone;
        if (refinedPhone.startsWith('0')) {
            waNumber = '88' + refinedPhone;
        }

        const date = document.getElementById('attendance-date').value;
        const madrasahName = localStorage.getItem('madrasah_name') || 'মাদরাসাতুল মদিনা';

        const wpMessage = `প্রিয় অভিভাবক,
আজ ${date} তারিখে আপনার সন্তান ${student.name} ${madrasahName}-এ অনুপস্থিত রয়েছে। অনুপস্থিতির সুনির্দিষ্ট কারণ জানাতে অনুগ্রহ করে হেল্পলাইনে যোগাযোগ করুন। ধন্যবাদ।`;

        const wpUrl = `https://wa.me/${waNumber}?text=${encodeURIComponent(wpMessage)}`;
        window.open(wpUrl, '_blank');
    };
})();
</script>
